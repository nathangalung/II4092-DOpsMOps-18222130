name: Service Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Python Services Tests
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/automation/materialization
          - services/automation/retraining
          - services/dashboard/ml-bridge
          - services/processing/batch
          - services/processing/vector
          - services/quality/analyzer
          - services/training/drift
          - services/training/trainer

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        working-directory: ${{ matrix.service }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/src
          uv run pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ${{ matrix.service }}/coverage.xml
          flags: python-${{ matrix.service }}
          fail_ci_if_error: false

  # Go Services Tests
  go-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/dashboard/backend
          - services/ingestion/rest-collector

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Get dependencies
        working-directory: ${{ matrix.service }}
        run: go mod download

      - name: Run tests with coverage
        working-directory: ${{ matrix.service }}
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ${{ matrix.service }}/coverage.out
          flags: go-${{ matrix.service }}
          fail_ci_if_error: false

  # Rust Services Tests
  rust-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/ingestion/websocket-collector
          - services/processing/stream/feature-engine
          - services/quality/validator
          - services/serving/feature-cache
          - services/serving/gateway

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.service }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        working-directory: ${{ matrix.service }}
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ${{ matrix.service }}/lcov.info
          flags: rust-${{ matrix.service }}
          fail_ci_if_error: false

  # Java/Flink Tests (Mill build tool)
  java-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Mill
        run: |
          curl -L https://raw.githubusercontent.com/lefou/millw/main/millw > mill
          chmod +x mill
          sudo mv mill /usr/local/bin/mill

      - name: Run tests
        working-directory: services/processing/stream/flink-job
        run: mill flink.test

  # TypeScript/React Frontend Tests
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: services/dashboard/frontend
        run: bun install

      - name: Run tests with coverage
        working-directory: services/dashboard/frontend
        run: bun run test:coverage

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: services/dashboard/frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # C++ Inference Engine Tests
  cpp-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgrpc++-dev protobuf-compiler-grpc

      - name: Build and test
        working-directory: services/serving/inference-engine
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
          make -j$(nproc)
          ctest --output-on-failure || true

  # Summary job that depends on all tests
  test-summary:
    runs-on: ubuntu-latest
    needs:
      [
        python-tests,
        go-tests,
        rust-tests,
        java-tests,
        frontend-tests,
        cpp-tests,
      ]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Python tests: ${{ needs.python-tests.result }}"
          echo "Go tests: ${{ needs.go-tests.result }}"
          echo "Rust tests: ${{ needs.rust-tests.result }}"
          echo "Java tests: ${{ needs.java-tests.result }}"
          echo "Frontend tests: ${{ needs.frontend-tests.result }}"
          echo "C++ tests: ${{ needs.cpp-tests.result }}"

          if [ "${{ needs.python-tests.result }}" = "failure" ] || \
             [ "${{ needs.go-tests.result }}" = "failure" ] || \
             [ "${{ needs.rust-tests.result }}" = "failure" ] || \
             [ "${{ needs.java-tests.result }}" = "failure" ] || \
             [ "${{ needs.frontend-tests.result }}" = "failure" ]; then
            echo "Some tests failed"
            exit 1
          fi
          echo "All tests passed!"
