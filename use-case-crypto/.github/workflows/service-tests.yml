name: Service Tests

# Use-case-crypto CI matrix.  Tests only the services that actually live
# under use-case-crypto/services/ — domain-agnostic siblings (analyzer,
# trainer, drift, vector, gateway, inference-engine, etc.) are owned and
# tested by the platform repo (ADR-013).
#
# Buildable + testable services in use-case-crypto:
#   - services/dashboard/ml-bridge       (Python, uv)
#   - services/dashboard/backend         (Go)
#   - services/dashboard/frontend        (TypeScript, bun)
#   - services/websocket-collector       (Rust, depends on platform crate via path)
#   - services/processing/stream-processor (Java, Mill)
#   - services/retraining                (Python, app.py only — image build, no unit tests)
#   - services/processing/batch          (dbt-style transformers overlay, no unit tests)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/dashboard/ml-bridge

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        working-directory: ${{ matrix.service }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/src
          uv run pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ${{ matrix.service }}/coverage.xml
          flags: python-${{ matrix.service }}
          fail_ci_if_error: false

  go-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/dashboard/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Get dependencies
        working-directory: ${{ matrix.service }}
        run: go mod download

      - name: Run tests with coverage
        working-directory: ${{ matrix.service }}
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ${{ matrix.service }}/coverage.out
          flags: go-${{ matrix.service }}
          fail_ci_if_error: false

  # Rust use-case binary depends on the platform crate via a relative path
  # (`../../../platform/services/ingestion/websocket-collector`).  CI must
  # therefore check out both trees; in the mono-repo layout that's the
  # default `actions/checkout` behaviour, in a split-repo future it would
  # require an additional checkout step targeting the platform repo.
  rust-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/websocket-collector

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.service }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        working-directory: ${{ matrix.service }}
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ${{ matrix.service }}/lcov.info
          flags: rust-${{ matrix.service }}
          fail_ci_if_error: false

  # Mill build; the flink test module is configured in build.mill even
  # though no test classes ship yet (the stream-processor assembly is
  # layered on top of platform's flink-job image, integration tests run there).
  java-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Mill
        run: |
          curl -L https://raw.githubusercontent.com/lefou/millw/main/millw > mill
          chmod +x mill
          sudo mv mill /usr/local/bin/mill

      - name: Run tests
        working-directory: services/processing/stream-processor
        run: mill flink.test

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: services/dashboard/frontend
        run: bun install

      - name: Run tests with coverage
        working-directory: services/dashboard/frontend
        run: bun run test:coverage

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: services/dashboard/frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  test-summary:
    runs-on: ubuntu-latest
    needs:
      [
        python-tests,
        go-tests,
        rust-tests,
        java-tests,
        frontend-tests,
      ]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Python tests:   ${{ needs.python-tests.result }}"
          echo "Go tests:       ${{ needs.go-tests.result }}"
          echo "Rust tests:     ${{ needs.rust-tests.result }}"
          echo "Java tests:     ${{ needs.java-tests.result }}"
          echo "Frontend tests: ${{ needs.frontend-tests.result }}"

          if [ "${{ needs.python-tests.result }}"   = "failure" ] || \
             [ "${{ needs.go-tests.result }}"       = "failure" ] || \
             [ "${{ needs.rust-tests.result }}"     = "failure" ] || \
             [ "${{ needs.java-tests.result }}"     = "failure" ] || \
             [ "${{ needs.frontend-tests.result }}" = "failure" ]; then
            echo "Some tests failed"
            exit 1
          fi
          echo "All tests passed!"
