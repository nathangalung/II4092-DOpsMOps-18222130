version: 2

models:
  - name: fct_ohlcv_features
    description: "OHLCV data with moving averages and returns (gold layer)"
    columns:
      - name: symbol
        tests:
          - not_null
      - name: timestamp
        tests:
          - not_null
      - name: close
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - symbol
            - timestamp

  - name: fct_sentiment_agg
    description: "Windowed sentiment aggregations per symbol (gold layer)"
    columns:
      - name: symbol
        tests:
          - not_null

  - name: dim_fear_greed
    description: "Daily Fear & Greed index values"
    columns:
      - name: date
        tests:
          - not_null
          - unique

  - name: fct_training_data
    description: "Combined OHLCV + sentiment + fear & greed for ML training"
    columns:
      - name: symbol
        tests:
          - not_null
      - name: timestamp
        tests:
          - not_null
      - name: close
        tests:
          - not_null
