# =============================================================================
# ArgoCD AppProject for the crypto use-case (lives in its own repo)
# =============================================================================
# ADR-013. The platform repo no longer knows about `use-case-crypto`. This
# file declares the `use-case-crypto` AppProject (RBAC + repo allowlist +
# allowed destinations). The Application that actually deploys workloads is
# generated by the ApplicationSet in `applicationset.yaml` (sibling file).
#
# Apply order (one-time bootstrap):
#   kubectl apply -f use-case-crypto/argocd/application.yaml      # AppProject
#   kubectl apply -f use-case-crypto/argocd/applicationset.yaml   # ApplicationSet → Application
#
# Argo CD reconciles both thereafter.
#
# TO CREATE A NEW USE CASE:
#   1. Copy `use-case-crypto/argocd/{application,applicationset}.yaml` and
#      rename: `crypto-` -> `<your-name>-`, `use-case-crypto` ->
#      `use-case-<your-name>` everywhere.
#   2. Update `sourceRepos`, `destinations.namespace`, `source.repoURL`,
#      and the overlay path inside `applicationset.yaml`.
#   3. `kubectl apply -f use-case-<name>/argocd/application.yaml`
#   4. `kubectl apply -f use-case-<name>/argocd/applicationset.yaml`
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: use-case-crypto
  namespace: gitops
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: usecase
    usecase: crypto
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Crypto use-case overlay — microservices, DAGs, dbt, KFP pipelines, Vault seed, ExternalSecrets"
  sourceRepos:
    - "http://gitea.gitops.svc.cluster.local:3000/platform/use-case-crypto.git"
  destinations:
    # Workloads live in use-case-crypto; Vault bootstrap Job targets `security`.
    - { namespace: use-case-crypto, server: https://kubernetes.default.svc }
    - { namespace: security,        server: https://kubernetes.default.svc }
    # KafkaTopic CRs are co-located with the Strimzi Topic Operator that
    # watches them; it lives in `data-ingestion`. The crypto use-case owns
    # topic names `crypto.*` and declares them here (see
    # manifests/base/kafka-topics/*.yaml).
    - { namespace: data-ingestion,  server: https://kubernetes.default.svc }
    # Velero `Schedule` CRs must be created in the Velero namespace.
    - { namespace: velero,          server: https://kubernetes.default.svc }
    # Retraining CronWorkflow and ExternalSecret target model-lifecycle.
    - { namespace: model-lifecycle, server: https://kubernetes.default.svc }
    # AuthorizationPolicy resources target istio-system.
    - { namespace: istio-system,    server: https://kubernetes.default.svc }
    # Chaos-mesh Schedule/Workflow CRs are co-located with the chaos-mesh
    # controller that reconciles them; the crypto use-case owns crypto-*
    # chaos experiments (manifests/base/chaos-mesh/*.yaml).
    - { namespace: chaos-mesh,      server: https://kubernetes.default.svc }
  clusterResourceWhitelist:
    - { group: "",                          kind: Namespace }
    - { group: "rbac.authorization.k8s.io", kind: ClusterRole }
    - { group: "rbac.authorization.k8s.io", kind: ClusterRoleBinding }
    - { group: "apiextensions.k8s.io",      kind: CustomResourceDefinition }
  namespaceResourceWhitelist:
    - { group: "*", kind: "*" }
  orphanedResources:
    warn: true
  roles:
    - name: crypto-admin
      description: "Full admin on crypto use-case Applications"
      policies:
        - "p, proj:use-case-crypto:crypto-admin, applications, *, use-case-crypto/*, allow"
        - "p, proj:use-case-crypto:crypto-admin, exec, create, use-case-crypto/*, allow"
      groups: ["crypto-admins"]
    - name: crypto-viewer
      policies:
        - "p, proj:use-case-crypto:crypto-viewer, applications, get, use-case-crypto/*, allow"
      groups: ["crypto-viewers"]
