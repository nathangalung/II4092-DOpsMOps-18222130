# =============================================================================
# VECTOR EMBEDDING — Sentiment Embedding Generation (Python + BERT)
# =============================================================================
# Generates BERT embeddings for news/sentiment and stores in Qdrant.
#
# Infrastructure dependencies:
#   - Qdrant (v1.13.2): Vector DB for embedding storage + similarity search
#     qdrant.storage.svc.cluster.local:6333 (REST) / 6334 (gRPC)
#   - ClickHouse: Sentiment data source, archival for aggregated features
#   - Redis: Feature cache for online serving (aggregated sentiment scores)
#   - Stencil (Raystack): Schema for embedding records
#
# Emits run outcome to platform Pushgateway via push-helper ConfigMap.
# =============================================================================
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vector-embedding
  labels:
    app: vector-processing
    type: embedding
    mlops-platform.io/use-case: crypto
spec:
  schedule: "*/5 * * * *" # Every 5 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    # Kueue admission: routes spawned Jobs to LocalQueue batch-queue
    # (use-case-crypto ns) → ClusterQueue mlops-cluster-queue. The webhook
    # softened in platform/components/common/kueue/pre-apply.sh only acts
    # on workloads carrying this label, so unlabeled bootstrap Jobs bypass
    # admission entirely. Label MUST be on jobTemplate.metadata (Job level),
    # not on the pod template — Kueue's Job integration reads Job labels.
    metadata:
      labels:
        kueue.x-k8s.io/queue-name: crypto-batch-queue
    spec:
      ttlSecondsAfterFinished: 600
      # 600→1800: in-cluster registry pulls under IO contention measured
      # at 18+ min (#402). The vector-processing image is larger than the
      # rest-collector image; first cold-cache fire pays once with
      # IfNotPresent below keeping later fires warm.
      activeDeadlineSeconds: 1800
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: vector-processing
            job-type: embedding-generation
        spec:
          restartPolicy: OnFailure
          # Pod-level securityContext satisfies PodSecurity "restricted"
          # and the Kyverno require-run-as-nonroot ClusterPolicy. Dockerfile
          # USER 1000:1000 is what actually runs the process; this block
          # tells the kubelet to enforce it.
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: embedding
              image: vector-processing:latest
              # IfNotPresent — local-registry pull serialises behind the
              # rest-collector pulls (#402). Always policy forced a full
              # re-pull every fire which queued into 18+ min waits.
              imagePullPolicy: IfNotPresent
              # Container-level securityContext required by Kyverno
              # require-capability-drop-all and PodSecurity "restricted":
              # NET_RAW + similar caps off, no privilege escalation.
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              # Wrap `python main.py` in shell that emits the run outcome
              # to Pushgateway via the same push-helper ConfigMap that
              # rest-collector CronJobs use. Image already has /bin/sh.
              # `python` resolves via Dockerfile PATH (/app/.venv/bin) —
              # `uv run` at runtime triggers editable rebuild needing
              # hatchling from PyPI which fails air-gapped.
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -u
                  . /scripts/push_job_metrics.sh
                  run_and_push python main.py --mode embeddings
              envFrom:
                - configMapRef:
                    name: pipeline-config
                - secretRef:
                    name: pipeline-secrets
              env:
                - name: EMBEDDING_MODEL
                  value: "sentence-transformers/all-mpnet-base-v2"
                - name: EMBEDDING_DIM
                  value: "768"
                - name: JOB_NAME
                  value: "vector_embedding"
                - name: USE_CASE
                  value: "crypto"
                # Pin the HuggingFace cache to the path the model is baked
                # into at image build (Dockerfile ENV). Path lives outside
                # /home/app/.cache/ to avoid colliding with the uv cache
                # BuildKit mount during image build. Without this env the
                # library falls back to /home/<user>/.cache/huggingface,
                # which would be cold (no baked weights) on every fire.
                - name: HF_HOME
                  value: "/home/app/hf-cache"
              resources:
                requests:
                  cpu: "500m"
                  memory: "2Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
              volumeMounts:
                - name: config
                  mountPath: /app/config
                # Model weights live in the image at /home/app/hf-cache
                # (baked by Dockerfile, HF_HOME env above). No model-cache
                # volume is mounted — an EmptyDir at /root/.cache/
                # huggingface was both wrong-path-for-uid-1000 and a cold
                # cache each fire.
                - name: push-helper
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: config
              configMap:
                name: pipeline-config
            - name: push-helper
              configMap:
                name: push-helper
                defaultMode: 0555
