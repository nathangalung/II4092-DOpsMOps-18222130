# CoinGecko market data — free Demo plan (30 req/min, needs free API key)
# Runs every hour, fetches market overview and trending data
# Emits run outcome to platform Pushgateway via push-helper ConfigMap.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: supplementary-coingecko
  labels:
    app: supplementary-coingecko
    component: ingestion
    mlops-platform.io/use-case: crypto
spec:
  schedule: "15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: supplementary-coingecko
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: push-helper
              configMap:
                name: push-helper
                defaultMode: 0555
          containers:
            - name: rest-collector
              image: rest-collector:latest
              imagePullPolicy: IfNotPresent
              # Wrap the Go binary in a shell that captures rc + duration
              # and emits to Pushgateway on exit (success or failure).
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -u
                  . /scripts/push_job_metrics.sh
                  run_and_push /app/rest-collector --once
              envFrom:
                - configMapRef:
                    name: pipeline-config
                - secretRef:
                    name: pipeline-secrets
              env:
                - name: HISTORY_BACKFILL_ON_START
                  value: "false"
                - name: POLLING_ENABLED
                  value: "false"
                - name: SUPPLEMENTARY_SOURCE_NAME
                  value: "coingecko"
                - name: SUPPLEMENTARY_SOURCE_URL
                  value: "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum&order=market_cap_desc&per_page=10&page=1&sparkline=false"
                - name: SUPPLEMENTARY_SOURCE_ENABLED
                  value: "true"
                - name: SUPPLEMENTARY_SOURCE_POLL_INTERVAL
                  value: "0s"
                - name: SUPPLEMENTARY_SOURCE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: pipeline-secrets
                      key: COINGECKO_API_KEY
                      optional: true
                - name: SUPPLEMENTARY_SOURCE_API_KEY_HEADER
                  value: "x-cg-demo-api-key"
                - name: SUPPLEMENTARY_BACKFILL_ENABLED
                  value: "true"
                - name: SUPPLEMENTARY_BACKFILL_START_DATE
                  value: "2026-03-01T00:00:00Z"
                - name: COINGECKO_BACKFILL_COINS
                  value: "bitcoin,ethereum"
                - name: KAFKA_SUPPLEMENTARY_TOPIC
                  value: "crypto.supplementary"
                - name: JOB_NAME
                  value: "supplementary_coingecko"
                - name: USE_CASE
                  value: "crypto"
              volumeMounts:
                - name: push-helper
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
