apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-config
data:
  # --- ClickHouse (drift-detector, dbt, validator, trainer, analyzer) ---
  # Schema-qualified tables live under bronze/silver/gold; the `features`
  # database holds VIEWs that wrap bronze sources for feature-store and
  # drift detection (see use-case-crypto/database/init_clickhouse.sql L491+).
  CLICKHOUSE_HOST: "clickhouse-platform.storage.svc.cluster.local"
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_DB: "features"
  # Schema-qualified — serving.yaml overrides CLICKHOUSE_DB to "default" so
  # unqualified table names won't resolve; consumers read bronze.* directly.
  CLICKHOUSE_TABLE: "bronze.crypto_ohlcv_features"
  DRIFT_SINK_TABLE: "gold.drift_multi_scale"
  DRIFT_SINK_SYMBOL: "BTC-USD"
  # --- rest-collector config path ---
  # The rest-collector reads its data-source and endpoint definitions from
  # a file-based config (see configmaps/rest-collector-config.yaml) because
  # per-endpoint polling cannot be expressed as flat env vars. The patches/
  # rest-collector.yaml file mounts the ConfigMap at the path below.
  CONFIG_PATH: "/etc/rest-collector/config.yaml"

  # --- Symbol list (consumed by non-Go services — analyzer, feature-engine) ---
  # Keep in sync with data_sources[].symbols in rest-collector-config.yaml
  # and with SYMBOLS in schema.yaml.
  COINBASE_SYMBOLS: "BTC-USD,ETH-USD"
  COINBASE_GRANULARITY: "3600"
  COINBASE_ENABLED: "true"

  # --- Sentiment ---
  SENTIMENT_CRYPTOPANIC_ENABLED: "true"
  SENTIMENT_FEARGREED_ENABLED: "true"

  # --- Field mapping for generic array-of-arrays historical responses ---
  # Read by rest-collector's FetchHistorical via RESPONSE_FIELD_MAPPING env.
  # Coinbase candle order: [time, low, high, open, close, volume]
  RESPONSE_FIELD_MAPPING: "timestamp,low,high,open,close,volume"
  PRIMARY_VALUE_COLUMN: "close"

  # --- Intervals ---
  COLLECTION_INTERVAL: "300"
  PROCESSING_INTERVAL: "300"
  TRAINING_INTERVAL: "21600"

  # --- History/backfill ---
  # Smart backfill: on startup, checks ClickHouse for latest data timestamp.
  # If data exists, backfills from last timestamp to now (gap-fill).
  # If no data, backfills from HISTORY_START_DATE to now.
  # HISTORY_END_DATE is ignored — always backfills to current time.
  # These are still consumed via env-var overrides (viper BindEnv).
  HISTORY_START_DATE: "2026-03-01T00:00:00Z"
  HISTORY_END_DATE: ""
  HISTORY_BACKFILL_ON_START: "true"
  BACKFILL_CLICKHOUSE_URL: "http://clickhouse-platform.storage.svc.cluster.local:8123"
  BACKFILL_CLICKHOUSE_TABLE: "bronze.crypto_ohlcv"

  # --- Supplementary backfill ---
  SUPPLEMENTARY_BACKFILL_ENABLED: "true"
  SUPPLEMENTARY_BACKFILL_START_DATE: "2026-03-01T00:00:00Z"
  COINGECKO_BACKFILL_COINS: "bitcoin,ethereum"
