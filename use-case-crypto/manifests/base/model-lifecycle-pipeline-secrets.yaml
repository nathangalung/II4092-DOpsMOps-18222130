# =============================================================================
# pipeline-secrets (model-lifecycle ns) — KFP executor pod env mounts
# =============================================================================
# KFP single-user mode (`MULTIUSER: false` in `pipeline-api-server-config`)
# executes EVERY pipeline run inside the `model-lifecycle` namespace, not in
# the requesting use-case namespace. The retraining pipeline's
# `kubernetes.use_secret_as_env(secret_name="pipeline-secrets", ...)` calls on
# the drift + train tasks therefore resolve against `model-lifecycle`, not
# `use-case-crypto`. Without this mirror the workflow admission fails because
# the Secret simply doesn't exist in that namespace.
#
# Why a mirror (not a refactor):
#   Other use-case-crypto workloads (validator, analyzer, GE checkpoint, ...)
#   already depend on `pipeline-secrets` living in `use-case-crypto`. Moving it
#   would break them. ESO reads both sides from the same OpenBao paths, so a
#   credential rotation in OpenBao propagates to both Secrets in lockstep.
#
# Scope: ONLY the keys the retraining pipeline reads via use_secret_as_env
# (CLICKHOUSE_USER / CLICKHOUSE_PASSWORD / VALKEY_PASSWORD — see
# pipelines/retraining_pipeline.py lines ~248 + ~284). Add new keys here if
# new use_secret_as_env mounts are added to the pipeline.
#
# Domain-neutral by design: the SOURCE keys in OpenBao
# (`platform/clickhouse/admin`, `platform/valkey/auth`) are the same paths
# the platform itself seeds in `openbao-bootstrap` — no crypto-specific
# OpenBao path is referenced, so a non-crypto use-case can copy this file
# verbatim and the secret materialises against the same platform creds.
#
# Wired via use-case-crypto/manifests/cross-namespace/kustomization.yaml
# (NOT base/kustomization.yaml — the latter sets `namespace: use-case-crypto`
# which would clobber the explicit `namespace: model-lifecycle` below).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pipeline-secrets
  namespace: model-lifecycle
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: ml-pipeline
    application-crd-id: kubeflow-pipelines
spec:
  refreshInterval: 1h
  secretStoreRef: { name: platform-openbao, kind: ClusterSecretStore }
  target:
    name: pipeline-secrets
    creationPolicy: Owner
  data:
    - { secretKey: CLICKHOUSE_USER,     remoteRef: { key: platform/clickhouse/admin, property: username } }
    - { secretKey: CLICKHOUSE_PASSWORD, remoteRef: { key: platform/clickhouse/admin, property: password } }
    - { secretKey: VALKEY_PASSWORD,     remoteRef: { key: platform/valkey/auth,     property: password } }
