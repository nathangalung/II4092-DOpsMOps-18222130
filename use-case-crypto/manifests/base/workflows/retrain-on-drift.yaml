# =============================================================================
# Argo CronWorkflow — retrain-on-drift (crypto use-case)
# =============================================================================
# ADR-017.  Closes the MLOps feedback loop:
#
#   every 6h  →  query gold.drift_multi_scale (last 6h window)
#             →  if PSI or KS score exceeds threshold for any feature
#                AND drift-detector flagged the row trigger_retrain=1
#                (i.e. the scale is configured for retraining — minute
#                scale stays out of the loop by config), trigger the KFP
#                retraining_pipeline recurring run.
#             →  emit a Prometheus exemplar via Pushgateway so the SRE
#                dashboard records every trigger event.
#
# Runs in the `model-lifecycle` namespace (Argo Workflows controller ships
# with Kubeflow Pipelines there — see platform/components/gitops/
# kustomization.yaml note about lease contention).  Use-case scope —
# the drift threshold and KFP pipeline name are crypto-specific, so this
# CronWorkflow lives under use-case-crypto/.
#
# Dependencies (platform-provided):
#   - ClickHouse `clickhouse-platform.storage.svc` → `gold.drift_multi_scale`
#     ReplicatedMergeTree (producer: platform/services/quality/drift/main.py).
#   - KFP API at `ml-pipeline.model-lifecycle.svc:8888`.
#   - Pushgateway `pushgateway.observability.svc:9091`.
#   - ExternalSecret `retrain-on-drift` provisions CLICKHOUSE_USER /
#     CLICKHOUSE_PASSWORD from Vault path `secret/usecases/crypto/clickhouse`.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: retrain-on-drift
  namespace: model-lifecycle
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: retrain-trigger
    mlops-platform.io/use-case: crypto
spec:
  refreshInterval: 1h
  secretStoreRef: { name: platform-openbao, kind: ClusterSecretStore }
  target:
    name: retrain-on-drift
    creationPolicy: Owner
  data:
    - secretKey: CLICKHOUSE_USER
      remoteRef: { key: platform/clickhouse/admin, property: username }
    - secretKey: CLICKHOUSE_PASSWORD
      remoteRef: { key: platform/clickhouse/admin, property: password }
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: retrain-on-drift
  namespace: model-lifecycle
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: retrain-trigger
    mlops-platform.io/use-case: crypto
spec:
  schedule: "0 */6 * * *"       # every 6h on the hour
  concurrencyPolicy: Forbid     # do not overlap; a stuck run stays stuck
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  timezone: UTC
  workflowSpec:
    serviceAccountName: pipeline-runner       # KFP's runner SA (can call ml-pipeline)
    ttlStrategy:
      secondsAfterCompletion: 86400           # 1d — enough for incident review
    entrypoint: main
    arguments:
      parameters:
        - name: drift-threshold-psi
          value: "0.2"                        # PSI > 0.2  => distribution shift
        - name: drift-threshold-ks
          value: "0.15"                       # KS  > 0.15 => distribution shift
        - name: lookback-hours
          value: "6"
        - name: kfp-pipeline-name
          # display_name of the uploaded KFP Pipeline resource. The
          # decide-and-trigger step resolves this to a UUID at runtime via
          # the v2beta1 filter API — no static bootstrap UUID required.
          # `pipelines/submit_recurring.py` uploads under this exact name.
          value: "crypto-retraining_pipeline"
        - name: kfp-experiment-name
          # display_name of the KFP Experiment; also resolved at runtime.
          value: "crypto-retraining"
    templates:
      - name: main
        steps:
          - - name: measure-drift
              template: measure-drift
          - - name: decide-and-trigger
              template: decide-and-trigger
              arguments:
                parameters:
                  - name: psi-max
                    value: "{{steps.measure-drift.outputs.parameters.psi-max}}"
                  - name: ks-max
                    value: "{{steps.measure-drift.outputs.parameters.ks-max}}"
                  - name: feature-max
                    value: "{{steps.measure-drift.outputs.parameters.feature-max}}"

      # Query ClickHouse gold.drift_metrics for the highest PSI + KS scores
      # in the lookback window, and expose them as workflow outputs.
      - name: measure-drift
        inputs: {}
        outputs:
          parameters:
            - name: psi-max
              valueFrom: { path: /tmp/psi-max.txt }
            - name: ks-max
              valueFrom: { path: /tmp/ks-max.txt }
            - name: feature-max
              valueFrom: { path: /tmp/feature-max.txt }
        container:
          # clickhouse/clickhouse-client publishes only legacy 21.x tags on Docker Hub;
          # the server image ships /usr/bin/clickhouse-client and tracks the same tag
          # as the platform StatefulSet (platform/components/storage/clickhouse/installation.yaml).
          image: clickhouse/clickhouse-server:26.3.10.60
          command: [sh, -ceu]
          envFrom:
            - secretRef: { name: retrain-on-drift }
          args:
            - |
              LOOKBACK="{{workflow.parameters.lookback-hours}}"
              QUERY="
                SELECT
                  max(psi_value)     AS psi_max,
                  max(ks_statistic)  AS ks_max,
                  argMax(feature_name, psi_value + ks_statistic) AS feature_max
                FROM gold.drift_multi_scale
                WHERE timestamp >= now() - INTERVAL ${LOOKBACK} HOUR
                  AND trigger_retrain = 1
              "
              RESULT=$(clickhouse-client \
                --host clickhouse-platform.storage.svc.cluster.local \
                --port 9000 \
                --user "${CLICKHOUSE_USER}" \
                --password "${CLICKHOUSE_PASSWORD}" \
                --query "${QUERY}" \
                --format TSV)
              echo "drift probe result: ${RESULT}"
              # RESULT is a single TSV row: psi_max<TAB>ks_max<TAB>feature_max
              PSI=$(echo "${RESULT}" | awk -F'\t' '{print $1}')
              KS=$(echo  "${RESULT}" | awk -F'\t' '{print $2}')
              FEATURE=$(echo "${RESULT}" | awk -F'\t' '{print $3}')
              # Null-result guard: the query returns empty strings if the
              # table was empty in the window; default to 0 so the decision
              # step treats it as "no drift, no retrain".
              echo "${PSI:-0}"     > /tmp/psi-max.txt
              echo "${KS:-0}"      > /tmp/ks-max.txt
              echo "${FEATURE:-none}" > /tmp/feature-max.txt
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 250m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem: true blocks writing /tmp/{psi,ks,feature}-max.txt
            # outputs that the Argo wait container scrapes via outputs.parameters.path.
            # Mount an emptyDir at /tmp so the step writes there without losing
            # the read-only rootfs hardening on the rest of the container.
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities: { drop: [ALL] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        volumes:
          - name: tmp
            emptyDir: {}

      # Compare metrics to thresholds; if either is exceeded, POST to the
      # KFP API to kick off a recurring run. Always push a Prometheus metric
      # describing the outcome.
      - name: decide-and-trigger
        inputs:
          parameters:
            - name: psi-max
            - name: ks-max
            - name: feature-max
        container:
          # UV mandate: switched base from `python:3.13-alpine` (pulls pip)
          # to the astral uv image. Driver script is written to /tmp as a
          # PEP 723 inline-metadata file and launched via `uv run` — uv
          # resolves `requests==2.32.3` in an ephemeral venv (cached under
          # /tmp/.uv-cache) with no pip ever invoked.
          image: ghcr.io/astral-sh/uv:python3.14-trixie-slim
          command: [sh, -ceu]
          env:
            - name: KFP_API
              value: "http://ml-pipeline.model-lifecycle.svc.cluster.local:8888"
            - name: PUSHGATEWAY
              value: "http://pushgateway.observability.svc.cluster.local:9091"
            - name: HOME
              value: /tmp
            - name: UV_CACHE_DIR
              value: /tmp/.uv-cache
            - name: UV_LINK_MODE
              value: copy
          args:
            - |
              export PSI="{{inputs.parameters.psi-max}}"
              export KS="{{inputs.parameters.ks-max}}"
              export FEATURE="{{inputs.parameters.feature-max}}"
              export PSI_TH="{{workflow.parameters.drift-threshold-psi}}"
              export KS_TH="{{workflow.parameters.drift-threshold-ks}}"
              export PIPELINE_NAME="{{workflow.parameters.kfp-pipeline-name}}"
              export EXPERIMENT_NAME="{{workflow.parameters.kfp-experiment-name}}"

              cat > /tmp/decide.py <<'PYEOF'
              # /// script
              # requires-python = ">=3.13,<3.14"
              # dependencies = ["requests==2.32.3"]
              # ///
              import json
              import os
              import time

              import requests

              psi = float(os.environ["PSI"])
              ks  = float(os.environ["KS"])
              psi_th = float(os.environ["PSI_TH"])  # emitted as gauge for SRE cross-check
              ks_th  = float(os.environ["KS_TH"])   # emitted as gauge for SRE cross-check
              feature = os.environ["FEATURE"]
              pipeline_name = os.environ["PIPELINE_NAME"]
              experiment_name = os.environ["EXPERIMENT_NAME"]
              kfp_api = os.environ["KFP_API"]
              triggered = 0


              def _resolve(endpoint: str, name: str, id_key: str) -> str:
                  """Resolve KFP resource UUID by display_name via filter API.

                  Tolerates grpc-gateway camelCase vs snake_case JSON emission
                  (e.g. `pipeline_id` vs `pipelineId`, `pipelines` vs
                  unchanged) so the workflow does not silently KeyError if
                  the KFP server flips serialization defaults.
                  """
                  flt = json.dumps({
                      "predicates": [{
                          "operation": "EQUALS",
                          "key": "display_name",
                          "stringValue": name,
                      }],
                  })
                  resp = requests.get(
                      f"{kfp_api}/apis/v2beta1/{endpoint}",
                      params={"filter": flt},
                      timeout=30,
                  )
                  resp.raise_for_status()
                  body = resp.json()
                  items = body.get(endpoint) or body.get(_camel(endpoint)) or []
                  if not items:
                      raise RuntimeError(
                          f"KFP {endpoint} not found: {name!r}. "
                          f"Run `uv run pipelines/submit_recurring.py` to register."
                      )
                  first = items[0]
                  return first.get(id_key) or first[_camel(id_key)]


              def _camel(snake: str) -> str:
                  head, *tail = snake.split("_")
                  return head + "".join(t.title() for t in tail)


              # Producer gate is authoritative: the SQL `trigger_retrain = 1`
              # filter only returns rows where main.py already decided the
              # drift event warrants retraining (per-scale config + thresholds
              # in pipeline-config). Workflow must NOT re-threshold — that
              # would silently drop KS-only drift, since the producer uses
              # `ks_pvalue < alpha` while we read max(ks_statistic) here.
              # Sentinel "none" means the lookback window had zero qualifying
              # rows (measure-drift defaults FEATURE to "none" when the
              # ClickHouse result is empty).
              if feature and feature != "none":
                  pipeline_id = _resolve("pipelines", pipeline_name, "pipeline_id")
                  experiment_id = _resolve(
                      "experiments", experiment_name, "experiment_id"
                  )
                  body = {
                      "display_name": f"crypto-retrain-{int(time.time())}",
                      "pipeline_version_reference": {"pipeline_id": pipeline_id},
                      "runtime_config": {
                          "parameters": {
                              "trigger_reason": {"string_value": f"drift({feature})"},
                              "psi_observed":   {"number_value": psi},
                              "ks_observed":    {"number_value": ks},
                          }
                      },
                      "experiment_id": experiment_id,
                  }
                  r = requests.post(
                      f"{kfp_api}/apis/v2beta1/runs",
                      json=body, timeout=30,
                  )
                  r.raise_for_status()
                  print(
                      f"Triggered KFP run: {r.json().get('run_id')} "
                      f"(pipeline_id={pipeline_id}, experiment_id={experiment_id})"
                  )
                  triggered = 1
              else:
                  print(
                      f"No producer-flagged drift in lookback window "
                      f"(psi_max={psi}, ks_stat_max={ks}, feature={feature!r}); "
                      f"no retrain."
                  )

              # Push exemplar to Prometheus through Pushgateway so the SRE
              # dashboard gets a point for every probe (triggered or not).
              metric = (
                  "# TYPE crypto_retrain_on_drift_psi gauge\n"
                  f"crypto_retrain_on_drift_psi {psi}\n"
                  "# TYPE crypto_retrain_on_drift_ks gauge\n"
                  f"crypto_retrain_on_drift_ks {ks}\n"
                  "# TYPE crypto_retrain_on_drift_psi_threshold gauge\n"
                  f"crypto_retrain_on_drift_psi_threshold {psi_th}\n"
                  "# TYPE crypto_retrain_on_drift_ks_threshold gauge\n"
                  f"crypto_retrain_on_drift_ks_threshold {ks_th}\n"
                  "# TYPE crypto_retrain_on_drift_triggered gauge\n"
                  f"crypto_retrain_on_drift_triggered {triggered}\n"
              )
              requests.post(
                  f"{os.environ['PUSHGATEWAY']}/metrics/job/retrain_on_drift/use_case/crypto",
                  data=metric,
                  timeout=10,
              ).raise_for_status()
              print("Pushed drift metrics to Pushgateway.")
              PYEOF
              uv run /tmp/decide.py
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 250m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false      # uv writes cache to /tmp
            runAsNonRoot: true
            runAsUser: 1000
            capabilities: { drop: [ALL] }
