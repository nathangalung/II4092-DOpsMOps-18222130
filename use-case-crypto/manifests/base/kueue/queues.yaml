# =============================================================================
# Kueue LocalQueues — use-case-crypto scope
# =============================================================================
# Cluster-scoped Kueue resources (ResourceFlavor + ClusterQueue) live at the
# platform layer — see `platform/components/common/kueue/queues.yaml`.
# Authoring those CRs in two places would break GitOps reconciliation with
# duplicate cluster-scoped objects.
#
# This file only declares the namespace-scoped LocalQueues that land in
# `use-case-crypto`. Both queues target the shared cluster queue:
#
#   ClusterQueue mlops-cluster-queue  (cohort=mlops, platform layer)
#     |
#     +-- LocalQueue training-queue   <-- Katib / KFP / training workloads
#     +-- LocalQueue batch-queue      <-- supplementary / vector-embedding /
#                                         dbt / feature-engineering CronJobs
#
# NAME-PREFIX CAVEAT
#   The local overlay (overlays/local/kustomization.yaml) sets
#   `namePrefix: crypto-`, which renames these LocalQueue resources to
#   `crypto-training-queue` and `crypto-batch-queue` in the rendered output.
#   Kustomize does NOT transform label *values*, so every workload's
#   `kueue.x-k8s.io/queue-name` label MUST be hardcoded to the post-prefix
#   name (`crypto-training-queue` / `crypto-batch-queue`) in base, or Kueue
#   admission will fail with "LocalQueue not found".
#
# Admission contract
#   1. The owning namespace MUST carry `kueue.mlops/use-case: "true"` so the
#      ClusterQueue namespaceSelector admits its LocalQueues.
#   2. Each workload sets the queue-name label on the Job-level metadata
#      (NOT on the pod template — Kueue's Job integration reads Job labels):
#
#         apiVersion: batch/v1
#         kind: CronJob
#         spec:
#           jobTemplate:
#             metadata:
#               labels:
#                 kueue.x-k8s.io/queue-name: crypto-batch-queue
#             spec:
#               template: ...
#
#      For a bare Job, the label sits on the Job's own metadata.labels.
#   3. Bootstrap / one-shot Jobs (openbao bootstrap, schema-registration,
#      superset bootstrap) intentionally stay unlabeled so they bypass
#      Kueue admission entirely — routing them through a queue can deadlock
#      install when the ClusterQueue budget is saturated.
# =============================================================================

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: training-queue
  namespace: use-case-crypto
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: queueing
spec:
  clusterQueue: mlops-cluster-queue

---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: batch-queue
  namespace: use-case-crypto
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: queueing
spec:
  clusterQueue: mlops-cluster-queue
