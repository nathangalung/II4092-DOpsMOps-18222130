# =============================================================================
# crypto use-case ExternalSecrets (ADR-008)
# =============================================================================
# Replaces the plaintext secretGenerator that lived in overlays/local.  Every
# microservice gets its credentials from Vault; rotating a credential is a
# `vault kv put` — no Git commit required.
#
# Vault paths:
#   secret/data/usecases/crypto/pipeline     → top-level pipeline creds
#   secret/data/usecases/crypto/api-keys     → Coinbase, CoinGecko, CryptoPanic, NewsAPI
#   secret/data/usecases/crypto/kserve       → KServe storage credentials (MinIO)
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pipeline-secrets
  labels:
    app: crypto-pipeline
    component: pipeline-secrets
spec:
  refreshInterval: 1h
  secretStoreRef: { name: platform-openbao, kind: ClusterSecretStore }
  target:
    name: pipeline-secrets
    creationPolicy: Owner
  data:
    - { secretKey: JWT_SECRET,              remoteRef: { key: usecases/crypto/pipeline, property: jwt_secret } }
    # platform/postgres/app == CNPG `platform` app role (owns pipeline DB +
    # has REPLICATION per cluster.yaml → Debezium CDC works with it).
    - { secretKey: POSTGRES_USERNAME,       remoteRef: { key: platform/postgres/app, property: username } }
    - { secretKey: POSTGRES_PASSWORD,       remoteRef: { key: platform/postgres/app, property: password } }
    - { secretKey: MLFLOW_TRACKING_PASSWORD,remoteRef: { key: usecases/crypto/pipeline, property: mlflow_password } }
    - { secretKey: S3_ACCESS_KEY_ID,        remoteRef: { key: platform/minio/root, property: username } }
    - { secretKey: S3_SECRET_ACCESS_KEY,    remoteRef: { key: platform/minio/root, property: password } }
    - { secretKey: AWS_ACCESS_KEY_ID,       remoteRef: { key: platform/minio/root, property: username } }
    - { secretKey: AWS_SECRET_ACCESS_KEY,   remoteRef: { key: platform/minio/root, property: password } }
    # ClickHouse admin creds — analyzer / outlier / GE write back into the
    # platform CHI. `default` user has a password since CHI installation.yaml
    # seeds `users.default.password_sha256_hex`, so clickhouse_connect /
    # http endpoint require basic auth. Sourced from `platform/clickhouse/admin`
    # (seeded by openbao-bootstrap).
    - { secretKey: CLICKHOUSE_USER,         remoteRef: { key: platform/clickhouse/admin, property: username } }
    - { secretKey: CLICKHOUSE_PASSWORD,     remoteRef: { key: platform/clickhouse/admin, property: password } }
    - { secretKey: COINBASE_API_KEY,        remoteRef: { key: usecases/crypto/api-keys, property: coinbase } }
    - { secretKey: COINGECKO_API_KEY,       remoteRef: { key: usecases/crypto/api-keys, property: coingecko } }
    - { secretKey: CRYPTOPANIC_API_KEY,     remoteRef: { key: usecases/crypto/api-keys, property: cryptopanic } }
    - { secretKey: NEWSAPI_KEY,             remoteRef: { key: usecases/crypto/api-keys, property: newsapi } }
    # Dashboard demo users (config.go fails-fast if any is unset).
    - { secretKey: USER_DATAENG_PASS,       remoteRef: { key: usecases/crypto/dashboard, property: dataeng_password } }
    - { secretKey: USER_DATASCI_PASS,       remoteRef: { key: usecases/crypto/dashboard, property: datasci_password } }
    - { secretKey: USER_MLENG_PASS,         remoteRef: { key: usecases/crypto/dashboard, property: mleng_password } }
    - { secretKey: USER_BUSUSER_PASS,       remoteRef: { key: usecases/crypto/dashboard, property: bususer_password } }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kserve-storage-secret
  annotations:
    serving.kserve.io/s3-endpoint: "minio.storage.svc.cluster.local:9000"
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-verifyssl: "0"
    serving.kserve.io/s3-region: "us-east-1"
  labels:
    app: crypto-pipeline
    component: kserve
spec:
  refreshInterval: 1h
  secretStoreRef: { name: platform-openbao, kind: ClusterSecretStore }
  target:
    name: kserve-storage-secret
    creationPolicy: Owner
    template:
      metadata:
        annotations:
          serving.kserve.io/s3-endpoint: "minio.storage.svc.cluster.local:9000"
          serving.kserve.io/s3-usehttps: "0"
          serving.kserve.io/s3-verifyssl: "0"
          serving.kserve.io/s3-region: "us-east-1"
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: platform/minio/root, property: username }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: platform/minio/root, property: password }
---
# =============================================================================
# crypto-keda-consumer — mirrored from data-ingestion (Strimzi User Operator)
# =============================================================================
# Source: KafkaUser `crypto-keda-consumer` (use-case-crypto/manifests/base/
# kafka-users/scram-users.yaml) → Strimzi emits Secret of the same name in
# `data-ingestion`. ESO `kubernetes` provider mirrors the chosen keys here so
# the KEDA TriggerAuthentication in this namespace (kafka-users/triggerauth.yaml)
# can mount them.
#
# Templated keys:
#   * `sasl.mechanism` — Strimzi only writes `password` and `sasl.jaas.config`,
#     not the literal mechanism string KEDA wants. We hard-code `scram-sha-512`
#     here because the KafkaUser's `authentication.type` is fixed.
#   * `tls.mode` — KEDA expects the literal `enable`; the source secret has no
#     such key, so we synthesise it.
#   * `ca.crt` — broker truststore, mirrored separately from the cluster CA
#     secret `platform-kafka-cluster-ca-cert`.
# Strimzi User Operator emits each KafkaUser's Secret with two keys only:
#   * `password`         — random SCRAM password
#   * `sasl.jaas.config` — fully-formed JAAS string (used by Java/Connect)
# It does NOT emit `username` (= KafkaUser metadata.name) or `ca.crt`. We
# template the username in as a literal and mirror the broker CA from the
# Strimzi-managed `platform-kafka-cluster-ca-cert` Secret (also in
# data-ingestion) through the same ClusterSecretStore.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keda-consumer
  labels:
    app: crypto-pipeline
    component: keda-auth
spec:
  refreshInterval: 1h
  secretStoreRef: { name: platform-kafka-users, kind: ClusterSecretStore }
  target:
    name: crypto-keda-consumer
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: "crypto-keda-consumer"
        password: "{{ .password }}"
        ca.crt: "{{ .ca_crt }}"
  data:
    - secretKey: password
      remoteRef: { key: crypto-keda-consumer, property: password }
    # Broker CA lives in a separate Strimzi-managed secret; mirror it through
    # the same store (RBAC already covers all secrets in data-ingestion).
    - secretKey: ca_crt
      remoteRef: { key: platform-kafka-cluster-ca-cert, property: ca.crt }
---
# crypto-app-consumer — mirrored for validator/feature-engine/analyzer pods
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-consumer
  labels:
    app: crypto-pipeline
    component: kafka-client
spec:
  refreshInterval: 1h
  secretStoreRef: { name: platform-kafka-users, kind: ClusterSecretStore }
  target:
    name: crypto-app-consumer
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Keys named for `envFrom: secretRef` consumption — kubelet drops keys
        # with `.` from envFrom (invalid env var names), so JAAS/CA stay file-
        # mounted (volume `kafka-ca` in patches/kafka-sasl.yaml) while creds
        # become clean uppercase env vars.
        KAFKA_SASL_USERNAME: "crypto-app-consumer"
        KAFKA_SASL_PASSWORD: "{{ .password }}"
        ca.crt: "{{ .ca_crt }}"
  data:
    - secretKey: password
      remoteRef: { key: crypto-app-consumer, property: password }
    - secretKey: ca_crt
      remoteRef: { key: platform-kafka-cluster-ca-cert, property: ca.crt }
