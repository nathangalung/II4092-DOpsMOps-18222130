# =============================================================================
# KEDA TriggerAuthentication — SCRAM creds for crypto kafka scalers
# =============================================================================
# `keda-operator` runs in the `keda` namespace but reads
# TriggerAuthentication + secret from the workload's namespace
# (use-case-crypto). The KafkaUser secret originates in `data-ingestion`
# (Strimzi User Operator emits it there); `external-secrets.yaml` mirrors it
# into this namespace as `crypto-keda-consumer` via a `kubernetes`
# ClusterSecretStore that reads from `data-ingestion/crypto-keda-consumer`.
# =============================================================================
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-kafka-auth
  namespace: use-case-crypto
  labels:
    app.kubernetes.io/part-of: mlops-platform
    usecase: crypto
spec:
  # `sasl` and `tls` parameters are NOT bound here — KEDA's ScaledObject
  # metadata fields (`sasl: scram_sha512`, `tls: enable`) carry the right
  # enum values directly, and Strimzi writes the dash-form `scram-sha-512`
  # which collides with KEDA's underscore enum if injected via secretTargetRef.
  secretTargetRef:
    - parameter: username
      name: crypto-keda-consumer
      key: username                  # literal = KafkaUser name (template-injected)
    - parameter: password
      name: crypto-keda-consumer
      key: password                  # Strimzi User Operator writes this directly
    - parameter: ca
      name: crypto-keda-consumer
      key: ca.crt                    # broker CA, mirrored from cluster CA secret
