# =============================================================================
# Crypto Superset bootstrap creds — OpenBao-sourced (ADR-008)
# =============================================================================
# The platform-side `superset-secrets` ExternalSecret lives in
# `data-processing` namespace, so the use-case-crypto bootstrap Job cannot
# mount it across namespaces.  We materialise a parallel Secret in
# `use-case-crypto` from the SAME OpenBao paths so the bootstrap Python
# script can:
#
#   * authenticate to Superset's REST API
#       /api/v1/security/login        (admin_username / admin_password)
#   * register the ClickHouse data source
#       platform/clickhouse/admin     (username / password)
#   * register the Postgres data source
#       platform/postgres/app         (username / password — same role used
#                                      by Trino, MLflow, dashboards-backend)
#
# Trino has no auth in this cluster (single-node, default config), so no
# Trino creds are needed.  MinIO is not registered as a Superset datasource
# (Trino's iceberg catalog already federates Iceberg-on-MinIO).
#
# Every credential is rotated by `openbao kv put platform/...` — no Git
# commit required, no plaintext in the manifest tree.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: superset-bootstrap-secrets
  labels:
    app.kubernetes.io/component: bi-bootstrap
    app.kubernetes.io/part-of: mlops-platform
    mlops-platform.io/use-case: crypto
spec:
  refreshInterval: 1h
  secretStoreRef: { name: platform-openbao, kind: ClusterSecretStore }
  target:
    name: superset-bootstrap-secrets
    creationPolicy: Owner
  data:
    # Superset admin login (also used to provision the Database/Dataset records)
    - secretKey: SUPERSET_ADMIN_USERNAME
      remoteRef: { key: platform/superset/admin, property: username }
    - secretKey: SUPERSET_ADMIN_PASSWORD
      remoteRef: { key: platform/superset/admin, property: password }
    # ClickHouse backend creds (clickhouse-connect SQLAlchemy dialect)
    - secretKey: CLICKHOUSE_USER
      remoteRef: { key: platform/clickhouse/admin, property: username }
    - secretKey: CLICKHOUSE_PASSWORD
      remoteRef: { key: platform/clickhouse/admin, property: password }
    # Postgres app role (mlflow + crypto pipeline DB owner)
    - secretKey: POSTGRES_USER
      remoteRef: { key: platform/postgres/app, property: username }
    - secretKey: POSTGRES_PASSWORD
      remoteRef: { key: platform/postgres/app, property: password }
