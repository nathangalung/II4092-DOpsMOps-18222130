# =============================================================================
# ServiceAccount for crypto pipeline workloads
# =============================================================================
# Platform RBAC Roles + RoleBindings are inherited from
# platform/services/base/rbac/ (see kustomization.yaml `resources:`). Only the
# ServiceAccount lives here because it is use-case-scoped — OpenBao binds its
# `crypto-runtime` role to this specific SA name.
#
# Name resolution with `namePrefix: crypto-`:
#   metadata.name here is `pipeline-sa` → becomes `crypto-pipeline-sa` at apply
#   time. openbao/bootstrap.yaml MUST bind OpenBao auth to the post-prefix
#   name (`crypto-pipeline-sa`), not the raw name declared here.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-sa
  labels:
    app.kubernetes.io/name: crypto-pipeline
