# =============================================================================
# Velero Schedule — hourly incremental backup of `use-case-crypto`
# =============================================================================
# Replaces the `hourly-data` helm-managed schedule that used to live in
# `platform/components/security/velero/helm-release.yaml` with a hard-coded
# `includedNamespaces: [..., use-case-crypto]` line.  Moving it here keeps
# the platform domain-agnostic (ADR-014 + ADR-013 boundary rule).
#
# What it backs up:
#   - All PVCs in `use-case-crypto` (Kopia file-system backup) — feature
#     store, dbt state, gateway TLS secrets, Airflow-DAG volume, etc.
#   - The Vault-seeded platform secrets we imported via ExternalSecrets
#     (so a disaster-recovery restore re-hydrates without needing Vault).
# Retention: 168h (7 days) per KNF-09.
# =============================================================================
apiVersion: velero.io/v1
kind: Schedule
metadata:
  # Bare `hourly` — overlays/local applies `namePrefix: crypto-` (see
  # kustomize-config/name-reference.yaml), so the rendered Schedule lands as
  # `crypto-hourly`, matching the live Schedule that has been producing
  # Backups since 2026-05-15. Setting `crypto-hourly` here would double-prefix
  # to `crypto-crypto-hourly` and orphan 100+ historical Backups under the
  # old name.
  name: hourly
  namespace: velero
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: backup
    usecase: crypto
spec:
  schedule: "0 * * * *"          # top of every hour
  # useOwnerReferencesInBackup=true puts an ownerReference (Schedule → Backup)
  # on every created Backup, so Argo CD does not list those Backups as
  # extraneous "orphans" under crypto-use-case-local (Argo respects ownerRefs
  # and tracks only the parent Schedule, not its generated Backups).
  useOwnerReferencesInBackup: true
  template:
    ttl: "168h"                  # 7 days
    includedNamespaces:
      - use-case-crypto
    snapshotVolumes: true
    defaultVolumesToFsBackup: true
    storageLocation: default
    volumeSnapshotLocations:
      - default
    # Exclude ephemeral / regenerable artifacts to keep backup small.
    excludedResources:
      - events
      - events.events.k8s.io
      - pods              # re-created by controllers
      - replicasets.apps  # re-created by Deployments
    hooks: {}              # no pre/post freeze; fs-backup uses Kopia.
