# =============================================================================
# KafkaTopic: crypto.supplementary
# =============================================================================
# Low-cadence context features — Fear & Greed index, CoinGecko market caps,
# DefiLlama TVL, on-chain metrics. Produced by supplementary CronJobs
# (deployments/cronjobs/supplementary-*.yaml).
#
# These values change hourly or slower, so we keep the topic narrow and
# heavily compacted to let consumers do a "read-latest" on startup.
#
# Sizing:
#   partitions        : 3     — low fan-in; 1 per upstream SaaS provider
#   replicas          : 3
#   retention.ms      : 30d
#   min.insync.replicas : 2
#   compression.type  : zstd
#   cleanup.policy    : compact,delete  — keep latest per key indefinitely
#                                         AND purge > 30d old keys
# =============================================================================
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: supplementary
  namespace: data-ingestion
  labels:
    strimzi.io/cluster: platform-kafka
    app.kubernetes.io/part-of: mlops-platform
    usecase: crypto
    stream-tier: bronze
spec:
  topicName: crypto.supplementary
  partitions: 3
  replicas: 3
  config:
    retention.ms: 2592000000           # 30d
    segment.ms: 604800000              # 7d
    min.insync.replicas: 2
    compression.type: zstd
    cleanup.policy: "compact,delete"
    min.cleanable.dirty.ratio: "0.1"
    delete.retention.ms: 86400000      # 1d grace before tombstones deleted
    max.message.bytes: 524288          # 512 KiB
    message.timestamp.type: CreateTime
