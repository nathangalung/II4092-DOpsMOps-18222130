# =============================================================================
# LOCAL PHASE 2 OVERLAY — Only Training + Drift Detection
# =============================================================================
# Deploys Train resources only. Does NOT re-deploy Data services.
# Data data must already be in ClickHouse (from prior setup-data run).
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: crypto-
namespace: use-case-crypto

resources:
  - ../../base-train

labels:
  - pairs:
      app.kubernetes.io/name: crypto-pipeline
      environment: development
    includeSelectors: true

images:
  - name: trainer
    newName: localhost:5000/crypto-trainer
    newTag: latest
  - name: drift-detector
    newName: localhost:5000/crypto-drift-detector
    newTag: latest
  - name: retraining
    newName: localhost:5000/crypto-retraining
    newTag: latest
  - name: materialization
    newName: localhost:5000/crypto-materialization
    newTag: latest
