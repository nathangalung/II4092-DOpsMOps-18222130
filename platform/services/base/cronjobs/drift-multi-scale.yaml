# =============================================================================
# DRIFT DETECTION — Multi-scale Monitoring (Python + scipy/numpy)
# =============================================================================
# Detects data drift and concept drift using PSI and KS tests at
# multiple time scales (minute, hourly, daily, weekly).
#
# Platform tool integration:
#   - Grafana: Unified alerting on drift detection events
#   - Prometheus: Drift metrics exported via Pushgateway
#   - Great Expectations: Data quality validation on reference vs current
#   - Kafka: Drift events published to 'drift-events' topic
# =============================================================================
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: drift-check-minute
  labels:
    app: drift-detector
    scale: minute
spec:
  schedule: "* * * * *" # Every minute
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          labels:
            app: drift-detector
            scale: minute
        spec:
          restartPolicy: Never
          containers:
            - name: drift-detector
              image: drift-detector:latest
              imagePullPolicy: IfNotPresent
              # UV mandate (project policy): no `uv run python`, no `python -c`.
              # `uv run main.py` runs the project entry point inside the synced
              # venv (uv.lock-pinned). `--scale minute --once` invokes the
              # one-shot CronJob mode (see main.py:212-251).
              command: ["uv", "run", "main.py"]
              args: ["--scale", "minute", "--once"]
              envFrom:
                - configMapRef:
                    name: pipeline-config
              resources:
                requests:
                  cpu: "50m"
                  memory: "128Mi"
                limits:
                  cpu: "200m"
                  memory: "512Mi"
---
