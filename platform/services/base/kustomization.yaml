# Services: 20 enabled, 0 disabled
# =============================================================================
# MICROSERVICE TEMPLATES — Full End-to-End ML Pipeline (AUTO-GENERATED)
# =============================================================================
# Generated by: uv run python scripts/generate_kustomization.py
# Source:       config/services.yaml (enabled flags)
#
# To regenerate after toggling services: make generate-kustomization
#
# Generic deployment/cronjob templates with NO domain-specific values.
# All configuration comes from the use-case's pipeline-config ConfigMap.
# Use-case overlays add namePrefix, namespace, image mappings, and patches.
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # ===========================================================================
  # CONFIGMAP / RBAC / HPA — always included
  # ===========================================================================
  - configmaps/pipeline-infrastructure.yaml
  - rbac/roles.yaml
  - rbac/bindings.yaml
  - hpa/autoscaling.yaml

  # ===========================================================================
  # INGESTION — Data collection
  # ===========================================================================
  # rest_collector
  - deployments/rest-collector.yaml
  - cronjobs/ingestion.yaml
  # websocket_collector
  - deployments/websocket-collector.yaml
  # backfill
  - cronjobs/backfill.yaml
  # supplementary
  - cronjobs/supplementary.yaml

  # ===========================================================================
  # QUALITY — Data validation
  # ===========================================================================
  # validator
  - deployments/validator.yaml
  # analyzer
  - deployments/analyzer.yaml

  # ===========================================================================
  # PROCESSING — Feature engineering
  # ===========================================================================
  # batch
  - deployments/batch-processing.yaml
  - cronjobs/batch-features.yaml
  # feature_engine
  - deployments/feature-engine.yaml
  # flink_job: enabled (no template — owned by use-case overlay)
  # vector
  - deployments/vector-processing.yaml
  - cronjobs/vector-embedding.yaml

  # ===========================================================================
  # TRAINING — Model training + drift detection
  # ===========================================================================
  # trainer
  - cronjobs/training.yaml
  # drift
  - cronjobs/drift-multi-scale.yaml

  # ===========================================================================
  # SERVING — Model inference API
  # ===========================================================================
  # gateway
  - deployments/gateway.yaml
  # feature_cache
  - deployments/feature-cache.yaml
  # inference_engine
  - deployments/inference-engine.yaml

  # ===========================================================================
  # AUTOMATION — Pipeline orchestration
  # ===========================================================================
  # materialization
  - cronjobs/materialization.yaml
  # retraining
  - cronjobs/retraining.yaml

  # ===========================================================================
  # DASHBOARD — Web UI
  # ===========================================================================
  # backend
  - deployments/dashboard-backend.yaml
  # frontend
  - deployments/dashboard-frontend.yaml
  # ml_bridge
  - deployments/ml-bridge.yaml

labels:
  - pairs:
      app.kubernetes.io/component: ml-pipeline
      app.kubernetes.io/part-of: mlops-platform
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true
