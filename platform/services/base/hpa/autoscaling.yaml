---
# =============================================================================
# PodDisruptionBudgets — one per long-running Deployment
# =============================================================================
# `maxUnavailable: 1` is the platform default. Idle workloads run at
# replicas=1 (single-node k3s), so any `minAvailable: 1` PDB would block
# `kubectl drain` and node maintenance. `maxUnavailable: 1` correctly
# permits a single eviction at idle (1/1 → 0) and at HPA-scaled load
# (e.g. 5/5 → 4/5) — kubelet then reschedules.
# CronJob pods (which reuse the same `app:` label on some services) are
# excluded via `matchExpressions: [key: type, operator: DoesNotExist]` where
# ambiguity exists (see rest-collector).
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rest-collector-pdb
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: rest-collector
    matchExpressions:
      # Exclude CronJob pods that may reuse the `app: rest-collector` label.
      - key: type
        operator: DoesNotExist
---
