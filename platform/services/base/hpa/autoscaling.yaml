# =============================================================================
# Platform template — plain CPU/memory HPAs only (domain-agnostic).
# =============================================================================
# ADR-022 + ADR-026 retired every HPA that depended on prometheus-adapter:
#   - feature-engine-hpa   (was `External kafka_consumer_lag`) → KEDA kafka trigger
#   - gateway-hpa          (was `Pods http_requests_per_second`) → KEDA prometheus trigger
# Live use cases declare their own KEDA ScaledObjects with use-case-
# specific topic names / consumer groups / thresholds that cannot be
# templated here (the platform knows nothing about any concrete topic).
# This file therefore ships only the generic CPU/memory HPAs that every
# deployment can benefit from with no external-metrics coupling. When you
# stamp a new use case, add `scaling/scaledobjects.yaml` under your
# overlay (`use-case-<name>/manifests/base/`) with your own kafka topics
# and Prometheus queries.
# =============================================================================
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rest-collector-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rest-collector
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 120
---
# feature-engine + gateway HPAs removed — scaling is KEDA-driven
# (ADR-022 / ADR-026). See the header comment above for the rationale.
---
