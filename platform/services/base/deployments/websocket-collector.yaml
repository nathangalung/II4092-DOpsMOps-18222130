# =============================================================================
# WEBSOCKET COLLECTOR — Real-time Stream Ingestion (Rust)
# =============================================================================
# Connects to WebSocket feeds → Kafka for real-time data.
# Schema validation via Karapace schema registry.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-collector
  labels:
    app: websocket-collector
    component: ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket-collector
  template:
    metadata:
      labels:
        app: websocket-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      containers:
        - name: websocket-collector
          image: websocket-collector:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: metrics
          envFrom:
            - configMapRef:
                name: pipeline-config
            - secretRef:
                name: pipeline-secrets
          env:
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-collector
spec:
  selector:
    app: websocket-collector
  ports:
    - port: 8080
      targetPort: 8080
      name: metrics
