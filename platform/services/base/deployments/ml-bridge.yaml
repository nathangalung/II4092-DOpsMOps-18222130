# =============================================================================
# ML BRIDGE — Service only (Deployment owned by Argo Rollout, ADR-025)
# =============================================================================
# Pod lifecycle for ml-bridge is owned by the Argo Rollout declared in
# the consuming use-case overlay
# (`use-case-<name>/manifests/base/rollouts/ml-bridge-rollout.yaml`,
# ADR-016 progressive delivery). The Rollout produces ReplicaSets whose
# pods carry `app: ml-bridge`; this Service targets that label so in-cluster
# callers (dashboard-frontend, gateway, analyzer) route to whichever
# Rollout revision is currently stable.
#
# Why the file still lives in platform/services/base:
#   - `app: ml-bridge` + the port contract (8086 → 8000) are generic across
#     use cases. Any future use case that adopts ml-bridge will reuse this
#     exact Service and only needs to ship its own Rollout.
#   - Keeping the Service here (not duplicating it into each use case)
#     preserves the domain-agnostic split declared in ADR-013.
#
# ADR-025 removed the `replicas: 0` placeholder Deployment that the
# previous ADR-016 pattern shipped. With the Rollout as the sole owner,
# no Deployment is needed — keeping one (even scaled to 0) added a PDB
# selector race and a drift target for no functional gain.
#
# Port contract (do not change without updating NetworkPolicies and the
# FastAPI app's PORT env):
#   - Service port 8086 avoids collision with dashboard-backend (8080).
#   - Target port 8000 matches main.py's `os.getenv("PORT", "8000")`.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ml-bridge
  labels:
    app: ml-bridge
    component: dashboard
spec:
  selector:
    app: ml-bridge
  ports:
    - port: 8086
      targetPort: 8000
      name: http
