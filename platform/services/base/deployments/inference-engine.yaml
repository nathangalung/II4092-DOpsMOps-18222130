# =============================================================================
# INFERENCE ENGINE — Model Serving (Python + ONNX Runtime)
# =============================================================================
# Loads trained models from MLflow Model Registry and serves predictions.
#
# Platform tool integration:
#   - MLflow (v3.6.0): Model versioning, experiment tracking, artifact storage
#   - KServe: Alternative model serving via InferenceService CRDs
#     Supports autoscaling, canary deployments, A/B testing
#     Example: kubectl apply -f inference-service.yaml
#   - MinIO: Model artifact storage (S3-compatible)
#   - Feast: Feature retrieval for inference requests
#   - Prometheus: Inference latency and throughput metrics
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-engine
  labels:
    app: inference-engine
    component: serving
spec:
  # Single-node k3s platform mandate — replicas=1 everywhere.
  replicas: 1
  selector:
    matchLabels:
      app: inference-engine
  template:
    metadata:
      labels:
        app: inference-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
    spec:
      containers:
        - name: inference-engine
          image: inference-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
              name: http
            - containerPort: 50052
              name: grpc
          envFrom:
            - configMapRef:
                name: pipeline-config
            - secretRef:
                name: pipeline-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inference-engine
spec:
  selector:
    app: inference-engine
  ports:
    - port: 8085
      targetPort: 8085
      name: http
    - port: 50052
      targetPort: 50052
      name: grpc
