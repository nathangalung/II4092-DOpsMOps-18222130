# Flink Job Configuration
flink.job.name=stream-job
kafka.bootstrap.servers=${KAFKA_BROKERS:localhost:9092}
# Property keys keep the `redis.*` prefix (Lettuce / RedisSink internal API);
# values are sourced from VALKEY_* envs supplied by pipeline-config /
# pipeline-secrets. Wire protocol is RESP — Valkey is fully drop-in.
redis.host=${VALKEY_HOST:localhost}
redis.port=${VALKEY_PORT:6379}
# VALKEY_PASSWORD is sourced at runtime from the pipeline-secrets Secret
# (mounted via envFrom). Left empty here so local test runs without OpenBao
# continue to work against an unauthenticated Valkey.
redis.password=${VALKEY_PASSWORD:}
