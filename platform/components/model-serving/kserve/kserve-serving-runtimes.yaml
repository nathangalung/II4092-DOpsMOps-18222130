# =============================================================================
# KServe ClusterServingRuntime — MLServer dedicated MLflow runtime
# =============================================================================
# FLAML AutoML trains models (LightGBM, XGBoost, CatBoost, RF, etc.) and logs
# them as MLflow artifacts to MinIO (s3://mlflow). KServe serves them via
# MLServer's built-in mlflow runtime, which handles any MLflow-packaged model
# regardless of the underlying algorithm.
#
# Serving path:
#   MLflow artifact (MinIO s3://mlflow) → InferenceService modelFormat: mlflow
#   → kserve-mlflowserver → MLServer pod (mlserver_mlflow.MLflowRuntime)
#   → predictions over the v2 (Open Inference) protocol.
#
# Why a DEDICATED mlflow runtime rather than the generic mlserver:
#   * autoSelect: true + modelFormat=mlflow lets KServe match this runtime
#     without an InferenceService label (`modelClass`) — every model in
#     this platform is MLflow-packaged (FLAML→MLflow→MinIO), so a generic
#     `{{.Labels.modelClass}}` template was dead overhead and a footgun
#     when omitted (pod CrashLoopBackOff with empty implementation).
#   * MLSERVER_MODEL_IMPLEMENTATION is hardcoded — single source of truth
#     means the runtime upgrade is the only place to bump the codepath.
#   * Native-format runtimes (lgbserver, sklearnserver, xgbserver) were
#     removed in an earlier ADR — all models flow through MLflow; native
#     formats never matched. No generic mlserver fallback: every artefact
#     in this platform is MLflow-packaged, so a label-driven runtime would
#     be dead code (and a footgun when modelClass is omitted).
# =============================================================================
---
apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: kserve-mlflowserver
  annotations:
    serving.kserve.io/server-type: mlserver
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: model-serving
    adr: "027"
spec:
  annotations:
    prometheus.kserve.io/path: /metrics
    prometheus.kserve.io/port: "8080"
  protocolVersions:
    - v2
  supportedModelFormats:
    - name: mlflow
      version: "1"
      autoSelect: true
      priority: 1
    - name: mlflow
      version: "2"
      autoSelect: true
      priority: 1
  containers:
    - name: kserve-container
      # MLServer 1.7.1 (2025-06-06) is the latest upstream release; SeldonIO
      # ships roughly one minor per year. Revisit when 1.8.x lands. The image
      # is shared by `kserve-mlserver` (generic) — single image, one pull,
      # cached on every node.
      image: docker.io/seldonio/mlserver:1.7.1
      # MLServer 1.7+ image has no ENTRYPOINT; CMD is empty too. KServe's
      # default `--model_name=`/`--http_port=` flags are NOT recognised by
      # the `mlserver` CLI (it accepts only `start <model-dir>`), so passing
      # them as args results in `exec: "--model_name=...": executable file
      # not found in $PATH`. Drive everything from MLSERVER_* env vars and
      # invoke the CLI explicitly.
      command: ["mlserver"]
      args: ["start", "/mnt/models"]
      env:
        - name: PROTOCOL
          value: v2
        - name: MLSERVER_HTTP_PORT
          value: "8080"
        - name: MLSERVER_GRPC_PORT
          value: "9000"
        - name: MLSERVER_MODEL_IMPLEMENTATION
          value: mlserver_mlflow.MLflowRuntime
        - name: MLSERVER_MODEL_NAME
          value: "{{.Name}}"
        - name: MLSERVER_MODEL_URI
          value: /mnt/models
      # Single-pod bootstrap; bump for production load.
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 2Gi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        privileged: false
        runAsNonRoot: true
