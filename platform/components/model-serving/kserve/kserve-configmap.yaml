# =============================================================================
# inferenceservice-config — KServe v0.17.0 controller configuration
# =============================================================================
# Schema: each top-level data key (`agent`, `batcher`, `storageInitializer`,
# `logger`, …) maps to a JSON struct that is unmarshalled directly into the
# matching Go config type in `kserve/pkg/types/config.go` and the
# pod-mutator injectors in `kserve/pkg/webhook/admission/pod/`. The keys in
# the JSON are the FLAT top-level field tags of those structs (image,
# cpuRequest, …) — do NOT wrap the JSON in an outer object named after the
# key, e.g. `{"batcher": {...}}` — the unmarshal targets a struct with
# `image`/`cpuRequest`/… directly, so a wrapper makes every quantity field
# the empty string and the validate-side `resource.ParseQuantity("")` fails
# with `quantities must match the regular expression …`. The pod-mutator
# webhook then denies *every* InferenceService pod admission with
# `Failed to parse resource configuration for "batcher"`. Field-validated
# 2026-05-07 against KServe v0.17.0 (commit
# pkg/webhook/admission/pod/batcher_injector.go:62-72).
# Likewise, the ConfigMap data key for the agent block is `agent` (singular)
# — `constants.AgentConfigMapKeyName = "agent"` in v0.17.0 — not `agents`.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: inferenceservice-config
  namespace: model-serving
  labels:
    app: kserve
    app.kubernetes.io/name: kserve
data:
  agent: |-
    {
        "image" : "kserve/agent:v0.17.0",
        "memoryRequest": "100Mi",
        "memoryLimit": "1Gi",
        "cpuRequest": "100m",
        "cpuLimit": "1"
    }
  batcher: |-
    {
        "image" : "kserve/agent:v0.17.0",
        "memoryRequest": "1Gi",
        "memoryLimit": "1Gi",
        "cpuRequest": "1",
        "cpuLimit": "1",
        "maxBatchSize": "32",
        "maxLatency": "5000"
    }
  credentials: |-
    {
       "gcs": {
           "gcsCredentialFileName": "gcloud-application-credentials.json"
       },
       "s3": {
           "s3AccessKeyIDName": "AWS_ACCESS_KEY_ID",
           "s3SecretAccessKeyName": "AWS_SECRET_ACCESS_KEY",
           "s3Endpoint": "",
           "s3UseHttps": "",
           "s3Region": "",
           "s3VerifySSL": "",
           "s3UseVirtualBucket": "",
           "s3UseAnonymousCredential": "",
           "s3CABundle": ""
       }
    }
  deploy: |-
    {
      "defaultDeploymentMode": "RawDeployment"
    }
  explainers: |-
    {
        "alibi": {
            "image" : "kserve/alibi-explainer",
            "defaultImageVersion": "v0.17.0"
        },
        "aix": {
            "image" : "kserve/aix-explainer",
            "defaultImageVersion": "v0.17.0"
        },
        "art": {
            "image" : "kserve/art-explainer",
            "defaultImageVersion": "v0.17.0"
        }
    }
  ingress: |-
    {
        "ingressGateway" : "model-serving/model-serving-gateway",
        "ingressService" : "model-serving/model-serving-ingress",
        "localGateway" : "",
        "localGatewayService" : "",
        "ingressDomain": "cluster.local",
        "ingressClassName": "",
        "disableIngressCreation": true,
        "domainTemplate": "{{ .Name }}-{{ .Namespace }}.svc.cluster.local",
        "urlScheme": "http"
    }
  logger: |-
    {
        "image" : "kserve/agent:v0.17.0",
        "memoryRequest": "100Mi",
        "memoryLimit": "1Gi",
        "cpuRequest": "100m",
        "cpuLimit": "1",
        "defaultUrl": "http://default-broker"
    }
  metricsAggregator: |-
    {
      "enableMetricAggregation": "false",
      "enablePrometheusScraping" : "false"
    }
  predictors: |-
    {
        "tensorflow": {
            "image": "tensorflow/serving",
            "defaultImageVersion": "2.6.2",
            "defaultGpuImageVersion": "2.6.2-gpu",
            "defaultTimeout": "60",
            "supportedFrameworks": [
              "tensorflow"
            ],
            "multiModelServer": false
        },
        "onnx": {
            "image": "mcr.microsoft.com/onnxruntime/server",
            "defaultImageVersion": "v1.0.0",
            "supportedFrameworks": [
              "onnx"
            ],
            "multiModelServer": false
        },
        "sklearn": {
            "image": "kserve/sklearnserver",
            "defaultImageVersion": "v0.17.0",
            "supportedFrameworks": [
              "sklearn"
            ],
            "multiModelServer": false
        },
        "xgboost": {
            "image": "kserve/xgbserver",
            "defaultImageVersion": "v0.17.0",
            "supportedFrameworks": [
              "xgboost"
            ],
            "multiModelServer": false
        },
        "pytorch": {
            "image": "kserve/torchserve",
            "defaultImageVersion": "0.11.0",
            "defaultGpuImageVersion": "0.11.0-gpu",
            "supportedFrameworks": [
              "pytorch"
            ],
            "multiModelServer": false
        },
        "triton": {
            "image": "nvcr.io/nvidia/tritonserver",
            "defaultImageVersion": "21.09-py3",
            "supportedFrameworks": [
              "tensorrt",
              "tensorflow",
              "onnx",
              "pytorch"
            ],
            "multiModelServer": true
        },
        "pmml": {
            "image": "kserve/pmmlserver",
            "defaultImageVersion": "v0.17.0",
            "supportedFrameworks": [
              "pmml"
            ],
            "multiModelServer": false
        },
        "lightgbm": {
            "image": "kserve/lgbserver",
            "defaultImageVersion": "v0.17.0",
            "supportedFrameworks": [
              "lightgbm"
            ],
            "multiModelServer": false
        },
        "paddle": {
            "image": "kserve/paddleserver",
            "defaultImageVersion": "v0.17.0",
            "supportedFrameworks": [
              "paddle"
            ],
            "multiModelServer": false
        }
    }
  storageSpec: |-
    {
      "storageUriSourceTable": {
        "gs": {"gcs": {"gcsCredentialFileName": "gcloud-application-credentials.json"}},
        "s3": {"s3": {"accessKeyIDSourceFrom": {"secretKeyRef": {"name": "kserve-storage-secret", "key": "aws_access_key_id"}}, "secretAccessKeySourceFrom": {"secretKeyRef": {"name": "kserve-storage-secret", "key": "aws_secret_access_key"}}}},
        "azure": {"azureBlob": {"accountNameSourceFrom": {"secretKeyRef": {"name": "storage-config", "key": "accountname"}}, "accountKeySourceFrom": {"secretKeyRef": {"name": "storage-config", "key": "accountkey"}}}}
      }
    }
  # storage-initializer initContainer config — KServe controller injects a
  # storage-initializer initContainer into every predictor pod when
  # `storageUri` points outside the cluster (e.g., s3://, gs://).  Without
  # this block the controller fails reconciliation with
  # `failed to parse resource configuration for "storageInitializer".memoryRequest`
  # because the default helper expects non-empty quantity strings.
  # Values match the upstream KServe v0.13 defaults.
  storageInitializer: |-
    {
      "image" : "kserve/storage-initializer:v0.17.0",
      "memoryRequest": "100Mi",
      "memoryLimit": "1Gi",
      "cpuRequest": "100m",
      "cpuLimit": "1",
      "caBundleConfigMapName": "",
      "caBundleVolumeMountPath": "/etc/ssl/custom-certs",
      "enableDirectPvcVolumeMount": false,
      "enableModelcar": false,
      "cpuModelcar": "10m",
      "memoryModelcar": "15Mi"
    }
  transformers: |-
    {
    }
---
# KServe S3 storage credentials.  Populated by ESO from
# `platform/minio/root` in OpenBao (ADR-008).  The key names `aws_access_key_id`
# / `aws_secret_access_key` are required by the `storageSpec` block above
# (lines 172-179) — do NOT rename without updating that reference.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kserve-storage-secret
  namespace: model-serving
  labels:
    app: kserve
    app.kubernetes.io/name: kserve
    app.kubernetes.io/part-of: mlops-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-openbao
    kind: ClusterSecretStore
  target:
    name: kserve-storage-secret
    creationPolicy: Owner
  data:
    - secretKey: aws_access_key_id
      remoteRef:
        key: platform/minio/root
        property: username
    - secretKey: aws_secret_access_key
      remoteRef:
        key: platform/minio/root
        property: password