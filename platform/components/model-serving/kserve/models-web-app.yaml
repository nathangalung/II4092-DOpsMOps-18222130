apiVersion: apps/v1
kind: Deployment
metadata:
  name: kserve-models-web-app
  namespace: model-serving
  labels:
    app: kserve-models-web-app
    app.kubernetes.io/component: kserve-models-web-app
    app.kubernetes.io/name: kserve
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: kserve-models-web-app
  template:
    metadata:
      labels:
        app.kubernetes.io/component: kserve-models-web-app
        app.kubernetes.io/name: kserve
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - image: kserve/models-web-app:v0.17.0
        imagePullPolicy: IfNotPresent
        name: kserve-models-web-app
        envFrom:
          - configMapRef:
              name: kserve-models-web-app-config
        env:
          - name: KUBERNETES_CLUSTER_DOMAIN
            value: cluster.local
        ports:
        - containerPort: 5000
          name: http
        livenessProbe:
          httpGet:
            path: /healthz/liveness
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /healthz/readiness
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        # Single-pod bootstrap; bump for production load.
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsUser: 1000
      serviceAccountName: kserve-models-web-app
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: kserve-models-web-app
  namespace: model-serving
  labels:
    app: kserve-models-web-app
    app.kubernetes.io/component: kserve-models-web-app
    app.kubernetes.io/name: kserve
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 5000
  selector:
    app.kubernetes.io/component: kserve-models-web-app
  type: ClusterIP