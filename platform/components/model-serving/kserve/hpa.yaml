apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kserve-models-web-app
  namespace: model-serving
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kserve-models-web-app
  minReplicas: 1
  maxReplicas: 1  # autoscaling disabled — single-node bootstrap
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
