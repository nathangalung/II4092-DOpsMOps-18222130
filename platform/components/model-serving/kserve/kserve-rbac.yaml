# =============================================================================
# kserve-minio-sa — ServiceAccount with MinIO S3 credentials for the
# storage-initializer initContainer that pulls models from
# `s3://platform-models/...` into the predictor pod.
#
# KServe storage-initializer reads:
#   - AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY from the SA's Secret
#   - serving.kserve.io/s3-* annotations from the same Secret to override
#     the AWS endpoint to in-cluster MinIO (HTTP, no SSL verification).
# This is the upstream pattern — see
# https://kserve.github.io/website/master/modelserving/storage/s3/s3/
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kserve-minio-storage
  namespace: model-serving
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: kserve
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-openbao
    kind: ClusterSecretStore
  target:
    name: kserve-minio-storage
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        annotations:
          # Endpoint is the in-cluster Service — no TLS, no signing-region
          # validation.  `s3-useanoncredential=false` is the default; we
          # rely on AWS_ACCESS_KEY_ID/SECRET below.
          serving.kserve.io/s3-endpoint: minio.storage.svc.cluster.local:9000
          serving.kserve.io/s3-usehttps: "0"
          serving.kserve.io/s3-region: us-east-1
          serving.kserve.io/s3-verifyssl: "0"
      data:
        AWS_ACCESS_KEY_ID: "{{ .minio_user }}"
        AWS_SECRET_ACCESS_KEY: "{{ .minio_pass }}"
  data:
    - secretKey: minio_user
      remoteRef: { key: platform/minio/root, property: username }
    - secretKey: minio_pass
      remoteRef: { key: platform/minio/root, property: password }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kserve-minio-sa
  namespace: model-serving
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: kserve
secrets:
  - name: kserve-minio-storage