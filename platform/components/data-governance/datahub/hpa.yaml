apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: datahub-gms
  namespace: data-governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: datahub-gms
  minReplicas: 1
  maxReplicas: 1  # autoscaling disabled — single-node bootstrap
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: datahub-frontend
  namespace: data-governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: datahub-frontend
  minReplicas: 1
  maxReplicas: 1  # autoscaling disabled — single-node bootstrap
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: datahub-actions
  namespace: data-governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: datahub-actions
  minReplicas: 1
  maxReplicas: 1  # autoscaling disabled — single-node bootstrap
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
