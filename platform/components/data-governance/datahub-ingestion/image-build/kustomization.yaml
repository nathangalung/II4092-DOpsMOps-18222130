apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Standalone bundle rendered + applied by ../pre-apply.sh (NOT pulled in by
# the parent datahub-ingestion/kustomization.yaml). The kaniko build Job
# here MUST run + complete before the feast CronJob's initContainer can
# pull the resulting image. Keeping it out of the main render means a
# normal `kubectl apply -k ../` doesn't blow up on partial-namespace
# state, and the build is opt-in to the apply-component.sh hook path.
resources:
  - build-resources.yaml
