# =============================================================================
# DataHub ingestion CronJobs — one per recipe
# =============================================================================
# ADR-013.  Each source has its own CronJob schedule.  Heavy scans (CH
# profiling, S3 path scanning) daily; fast sources (Airflow, MLflow, Feast)
# hourly.
#
# Yaml anchors don't work across Kustomize `---` document boundaries, so
# each CronJob is written explicitly.  The repeating container spec is
# shared via the recipes ConfigMap + an env var `RECIPE_FILE`.
#
# Recipe templating: acryldata/datahub-ingestion:v1.5.0.3 dropped
# gettext/envsubst from the image; running `envsubst` returns
# `sh: 2: envsubst: not found`. Python is bundled (datahub CLI is Python),
# so `os.path.expandvars` is the drop-in replacement — it expands `$VAR`
# and `${VAR}` from os.environ identically to envsubst.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: datahub-ingestion-env
  namespace: data-governance
spec:
  refreshInterval: 1h
  secretStoreRef: { name: platform-openbao, kind: ClusterSecretStore }
  target:
    name: datahub-ingestion-env
    creationPolicy: Owner
    # Strimzi's User Operator emits an `admin` SCRAM Secret containing only
    # `password` + `sasl.jaas.config` (no `username` key) which is mirrored
    # into OpenBao by `kafka-admin-to-openbao` PushSecret. Username is the static
    # KafkaUser name ("admin"), so we inject it via template instead of
    # forcing a synthetic openbao property.
    template:
      type: Opaque
      data:
        KAFKA_USER: "admin"
        KAFKA_PASSWORD: "{{ .KAFKA_PASSWORD }}"
        GMS_TOKEN: "{{ .GMS_TOKEN }}"
        PG_USER: "{{ .PG_USER }}"
        PG_PASSWORD: "{{ .PG_PASSWORD }}"
        # CH_* are the historical names used by clickhouse.yml; the
        # feast recipe substitutes ${CLICKHOUSE_USER}/${CLICKHOUSE_PASSWORD}
        # (Feast's feature_store.yaml convention).  Both surface from the
        # same OpenBao path so credential rotation stays atomic.
        CH_USER: "{{ .CH_USER }}"
        CH_PASSWORD: "{{ .CH_PASSWORD }}"
        CLICKHOUSE_USER: "{{ .CH_USER }}"
        CLICKHOUSE_PASSWORD: "{{ .CH_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
        # VALKEY_PASSWORD — Feast online_store (redis-protocol).  Required
        # to render the connection_string in the feast recipe's
        # feature_store.yaml at job start.
        VALKEY_PASSWORD: "{{ .VALKEY_PASSWORD }}"
  data:
    # GMS_TOKEN is a long-lived DataHub PAT JWT minted at openbao-bootstrap
    # time (mint_datahub_pat helper, signed with platform/datahub/admin/secret
    # — the same HMAC key GMS validates with via DATAHUB_TOKEN_SERVICE_SIGNING_KEY).
    # Ingestion sinks pass it as `Authorization: Bearer ${GMS_TOKEN}`.
    # Don't point this back at platform/datahub/admin.secret — that's the
    # raw signing key; sending it as a Bearer token returns HTTP 401 from
    # StatelessTokenService.validateAccessToken (signature mismatch).
    - { secretKey: GMS_TOKEN,            remoteRef: { key: platform/datahub/system_token, property: token } }
    - { secretKey: PG_USER,              remoteRef: { key: platform/postgres/app, property: username } }
    - { secretKey: PG_PASSWORD,          remoteRef: { key: platform/postgres/app, property: password } }
    - { secretKey: CH_USER,              remoteRef: { key: platform/clickhouse/admin,   property: username } }
    - { secretKey: CH_PASSWORD,          remoteRef: { key: platform/clickhouse/admin,   property: password } }
    - { secretKey: AWS_ACCESS_KEY_ID,    remoteRef: { key: platform/minio/root,         property: username } }
    - { secretKey: AWS_SECRET_ACCESS_KEY,remoteRef: { key: platform/minio/root,         property: password } }
    - { secretKey: KAFKA_PASSWORD,       remoteRef: { key: platform/kafka/admin,        property: password } }
    - { secretKey: VALKEY_PASSWORD,      remoteRef: { key: platform/valkey/auth,        property: password } }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: datahub-ingestion
  namespace: data-governance
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dbt-artifacts
  namespace: data-governance
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources: { requests: { storage: 1Gi } }
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: datahub-ingest-postgres, namespace: data-governance }
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          # Native sidecars (istiod ENABLE_NATIVE_SIDECARS=true) inject
          # `istio-proxy` as an initContainer with `restartPolicy: Always`,
          # which the kubelet terminates automatically once the main
          # container exits — Job pods reach `Succeeded` cleanly without
          # opting out of the mesh. Required so ingest pods can reach
          # `datahub-gms` (mesh-wide STRICT PeerAuthentication in
          # istio-system rejects plaintext from non-sidecar peers).
          labels: { app: datahub, component: ingestion }
        spec:
          serviceAccountName: datahub-ingestion
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: ingest
              image: acryldata/datahub-ingestion:v1.5.0.3
              # Capture last 4KB of stderr in the Pod's terminationMessage
              # field so post-mortem of BackoffLimitExceeded jobs is possible
              # after pods are GC'd (failedJobsHistoryLimit retains the Job
              # object but pods are deleted once backoffLimit is hit).
              terminationMessagePolicy: FallbackToLogsOnError
              envFrom: [{ secretRef: { name: datahub-ingestion-env } }]
              env: [{ name: RECIPE_FILE, value: "postgres.yml" }]
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  # UV mandate: switched from `python -c expandvars` (no
                  # envsubst in datahub-ingestion:v1.5.0.1 — see #145) to
                  # awk-based envvar interpolation. awk is in coreutils
                  # equivalent of the upstream image (gawk via debian base).
                  # Same ${VAR} regex semantics as `os.path.expandvars`.
                  awk '{ while (match($0, /\$\{[A-Za-z_][A-Za-z0-9_]*\}/)) { v=substr($0,RSTART+2,RLENGTH-3); $0=substr($0,1,RSTART-1) ENVIRON[v] substr($0,RSTART+RLENGTH) } print }' /recipes/$RECIPE_FILE > /tmp/recipe.yml
                  datahub ingest -c /tmp/recipe.yml
              volumeMounts:
                - { name: recipes, mountPath: /recipes, readOnly: true }
                - { name: tmp,     mountPath: /tmp }
              resources:
                # Single-pod bootstrap; bump for production load.
                requests: { cpu: 200m, memory: 256Mi }
                limits:   { cpu: 1000m, memory: 2Gi }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
          volumes:
            - { name: recipes, configMap: { name: datahub-ingestion-recipes } }
            - { name: tmp, emptyDir: {} }
