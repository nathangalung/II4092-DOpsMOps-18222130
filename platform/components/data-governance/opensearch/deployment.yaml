apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: data-governance
  labels:
    app: opensearch
spec:
  ports:
    - port: 9200
      name: http
      targetPort: 9200
    - port: 9300
      name: transport
      targetPort: 9300
  selector:
    app: opensearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: data-governance
  labels:
    app: opensearch
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: search-index
    app.kubernetes.io/part-of: mlops-platform
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Privileged sysctl init container removed: K3s host already exposes
      # vm.max_map_count=1048576 (cat /proc/sys/vm/max_map_count). Adding
      # the init container would violate PodSecurity baseline:latest. Set
      # the sysctl in /etc/sysctl.d/99-opensearch.conf on every node when
      # provisioning new VPS — value persists across reboot.
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.19.4
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          env:
            - name: discovery.type
              value: "single-node"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          resources:
            # Single-pod bootstrap; bump for production load.
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1.5Gi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opensearch
  namespace: data-governance
  labels:
    app: opensearch
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: opensearch
---
# Istio mesh enforces deny-by-default via `global-deny-all` in istio-system.
# Allow same-namespace + ingress gateway access to opensearch:9200 so
# datahub-{gms,actions,frontend} init probes and runtime queries succeed.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: opensearch-allow
  namespace: data-governance
  labels:
    app: opensearch
spec:
  selector:
    matchLabels:
      app: opensearch
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["data-governance", "istio-system", "model-lifecycle", "data-processing"]
      to:
        - operation:
            ports: ["9200", "9300"]
