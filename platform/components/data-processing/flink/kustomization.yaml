apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml         # RBAC + ConfigMap + ExternalSecret (platform-level Flink resources)
  - helm-release.yaml       # ADR-012: Argo Application installing flink-kubernetes-operator chart
  - flink-cluster.yaml      # Reference FlinkDeployment session-cluster (depends on operator CRDs)
