apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trino
  namespace: data-processing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trino
  # Coordinator (coordinator=true in config). Trino coordinator is
  # singleton — one active node owns query planning + discovery. Workers
  # scale, coordinator does not. Add worker StatefulSet HPA when wired.
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
