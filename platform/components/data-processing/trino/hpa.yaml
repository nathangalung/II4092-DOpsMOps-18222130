apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trino
  namespace: data-processing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trino
  minReplicas: 1
  maxReplicas: 1  # Single-pod bootstrap; bump for production load.
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
