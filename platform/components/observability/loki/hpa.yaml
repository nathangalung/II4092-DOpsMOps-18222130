apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: loki
  namespace: observability
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: loki
  minReplicas: 1
  maxReplicas: 1  # Single-pod bootstrap; bump for production load.
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
