apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: evidently
  namespace: observability
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: evidently
  # RWO PVC (evidently-workspace) on local-path — maxReplicas:1 to avoid
  # Pending pods. Promote to RWX storage class to horizontally scale.
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
