# =============================================================================
# Sloth 0.12.0 (2026-01-22) — SLO-as-code for Prometheus
# =============================================================================
# ADR-010.  The platform defines SLOs declaratively via the `PrometheusServiceLevel`
# CR.  Sloth watches those CRs and generates THREE artefacts into the
# kube-prometheus-stack:
#
#   1. Recording rules:   `slo:sli_error:ratio_rate{5m,30m,1h,2h,6h,1d,3d}`
#      — pre-aggregated SLI error ratios at multiple windows (cheap queries).
#   2. Alerting rules:    multi-window, multi-burn-rate (MWMBR) alerts per
#      the Google SRE Workbook §6 recipe.  Two alerts per SLO:
#        - Fast burn:  2% budget in 1h → PAGE
#        - Slow burn: 10% budget in 6h → TICKET
#   3. Grafana dashboards: auto-provisioned via the sloth-sidecar output.
#
# The existing kube-prometheus-stack ServiceMonitor already scrapes Sloth's
# `/metrics` endpoint (matches `release: kube-prometheus-stack` label).
# PrometheusRule CRs generated by Sloth carry the same release label so
# Prometheus Operator picks them up automatically.
#
# Why Sloth vs. plain PrometheusRule YAML?  Because the MWMBR alert recipe
# requires ~28 recording rules + 2 alerts PER SLO, all with finely-tuned
# time windows.  Hand-writing that for every SLI in the catalogue is a
# maintenance liability; Sloth compiles a one-page CR into the full set.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sloth
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: sloth
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: platform
  source:
    repoURL: https://slok.github.io/sloth
    chart: sloth
    # Chart 0.16.0 (latest on slok.github.io/sloth) bundles Sloth v0.12.0 app.
    targetRevision: 0.16.0
    helm:
      releaseName: sloth
      values: |
        # Chart 0.16.0 splits image registry from repository. Setting
        # `repository: ghcr.io/slok/sloth` results in the template
        # concatenating to `ghcr.io/ghcr.io/slok/sloth` → ImagePullBackOff.
        image:
          registry: ghcr.io
          repository: slok/sloth
          tag: v0.16.0
        resources:
          requests: { cpu: 50m,  memory: 128Mi }
          limits:   { cpu: 200m, memory: 256Mi } # Single-pod bootstrap; bump for production load.
        # Sloth runs as a Deployment that watches PrometheusServiceLevel CRs
        # cluster-wide and emits PrometheusRule CRs (for Prometheus Operator)
        # in the same namespace as the source SLO definition.
        sloth:
          # Labels added to EVERY generated recording + alerting rule — this
          # is how kube-prometheus-stack Prometheus discovers them.
          extraLabels:
            release: kube-prometheus-stack
          defaultSloPeriod: 30d
        # commonPlugins ships a git-sync sidecar that clones
        # slok/sloth-common-sli-plugins at runtime. We don't reference any
        # common plugins today — disabling the sidecar avoids pulling
        # registry.k8s.io/git-sync/git-sync + an extra container with no
        # securityContext and with network egress to github.com.
        commonPlugins:
          enabled: false
        metrics:
          enabled: true
        # PSA & Kyverno friendliness — chart defaults leave these null.
        securityContext:
          pod:
            runAsNonRoot: true
            runAsUser: 65532
            fsGroup: 65532
            seccompProfile: { type: RuntimeDefault }
          container:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    # selfHeal/prune disabled platform-wide so manual scale-down/delete is not auto-reverted during single-node tuning. Re-enable per app once stable.
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 5m }
  revisionHistoryLimit: 10
