apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: grafana-dashboards
    namespace: observability
    files:
      - dashboards/dataops-pipeline.json
      - dashboards/mlops-models.json
      - dashboards/storage-layer.json
