apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Kueue platform layer.
# Controller + CRDs + Webhooks + RBAC come from upstream via pre-apply.sh
# (kueue-system namespace). Local layer only contributes cluster-scoped
# queue topology used by every use-case. Namespace-scoped LocalQueues live
# in each use-case tree.
resources:
  - queues.yaml
