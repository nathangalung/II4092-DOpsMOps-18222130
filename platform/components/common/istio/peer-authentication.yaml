# =============================================================================
# Mesh-wide STRICT mTLS + allow-list AuthorizationPolicy
# =============================================================================
# KNF-07 (TLS 1.3 + mTLS between services).  Installed in the Istio root
# namespace (`istio-system`) so the policy applies to every sidecar-injected
# workload in every namespace.
#
# With STRICT, a workload's sidecar will reject plaintext.  Non-mesh
# workloads (e.g. k3s kubelet → pod on a hostNetwork pod, OpenBao server
# connecting to itself over localhost, or Longhorn iSCSI) must stay OUT of
# the mesh by not labeling their namespace `istio-injection=enabled`.
# =============================================================================
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: mlops-platform
spec:
  mtls:
    mode: STRICT
---
# Mesh-internal default: ALLOW any in-mesh traffic.  Combined with the
# PeerAuthentication STRICT above, a request can only reach a sidecar after
# completing mTLS — which means the source already proved its SPIFFE ID
# (cluster.local/ns/<ns>/sa/<sa>).  Edge ingress is gated by oauth2-proxy
# CUSTOM + APISIX upstream policies, so internal allow is safe.
#
# Empty rules `[{}]` means: ALLOW any authenticated source on any port.
# Sensitive endpoints (OpenBao unseal, KES admin) carry their own narrower
# DENY policies in their component manifests, layered on top.
#
# Resource keeps the historical name `global-deny-all` (live in cluster
# since 2026-04-06) so apply is a noop instead of recreating with a new
# name; the action below changes the semantics from deny→allow.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: global-deny-all
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: mlops-platform
spec:
  action: ALLOW
  rules:
    - {}
---
# Allow every ServiceAccount in the mesh to reach Istio Ingress Gateway
# (it's the entrypoint).  Actual auth is then enforced by the CUSTOM
# oauth2-proxy policy configured in components/common/auth/oauth2-proxy.yaml
# and by APISIX.
#
# Selector matches BOTH `app` and `istio` labels that the gateway pod
# carries; the extra `istio: ingressgateway` label guards against a
# workload that happens to share `app: istio-ingressgateway` without being
# the gateway.  This is how the resource has been live since 2026-04-06.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: istio-ingressgateway
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: mlops-platform
spec:
  selector:
    matchLabels:
      app: istio-ingressgateway
      istio: ingressgateway
  action: ALLOW
  rules:
    - {}
---
# NOTE: The `cluster-local-gateway` AuthorizationPolicy is defined in
# platform/components/common/knative/local-gateway.yaml alongside the
# cluster-local-gateway Deployment/Service/SDS-Role itself.  That is the
# right place for it: it co-locates the policy with the workload whose
# selector it targets, and kustomize forbids the same (kind, name,
# namespace) tuple being declared twice in a single build.  It is NOT
# repeated here.
---
# Mesh-wide outbound connection-pool defaults.  A root DestinationRule on
# `*.svc.cluster.local` applies to any client Envoy that doesn't have a
# more specific DR, which in practice today means the two gateway pods.
#
# WHY `trafficPolicy.tls` IS ABSENT
# ---------------------------------
# The obvious addition here is `tls.mode: ISTIO_MUTUAL` to force every
# outbound to use Istio-managed mTLS.  That would break the current
# cluster: only the two istio-system gateway pods carry sidecars, so
# every other service behind `*.svc.cluster.local` (APISIX, Knative
# activator, MLflow, Airflow scheduler, ...) is currently a plain TCP
# endpoint with no Envoy to terminate mTLS.  Setting ISTIO_MUTUAL
# cluster-wide would cause the gateway Envoys to initiate mTLS to those
# targets and every handshake would fail.
#
# The STRICT PeerAuthentication above still enforces mTLS on the
# server-side for any workload that is sidecar-injected, which is the
# security property we care about.  Once mesh occupancy grows (tracked
# as a separate task) we can re-introduce a scoped DestinationRule that
# demands ISTIO_MUTUAL only for hosts in sidecar-injected namespaces.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: default
  namespace: istio-system
  labels:
    app.kubernetes.io/part-of: mlops-platform
spec:
  host: "*.svc.cluster.local"
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 1000
        connectTimeout: 10s
      http:
        http1MaxPendingRequests: 1000
        http2MaxRequests: 10000
        maxRequestsPerConnection: 100
        maxRetries: 3
        idleTimeout: 60s
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
