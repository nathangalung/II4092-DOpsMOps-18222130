apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Common platform building blocks (applied across every namespace):
#   - cert-manager:   TLS for Istio Gateway, APISIX, service certs
#   - istio:          service mesh + Knative ingress + mTLS STRICT (ADR-009)
#   - knative:        serverless backbone for KServe InferenceServices
#   - auth:           Dex (OIDC) + oauth2-proxy (ExtAuthz chain)
#   - kubeflow-core:  gateway, per-profile NetworkPolicies, cluster roles
#   - kueue:          K8s-native job queueing (priority, quotas, fair sharing)
#   - metrics-server: k3s-bundled HPA backbone, patched for kubelet self-signed
#                     TLS so 30+ HPAs across the platform get CPU/mem metrics
#   - rbac:           ClusterRoles + bindings (data-engineer, data-scientist,
#                                               ml-engineer, business-user)
#   - registry:       CNCF Distribution v3 in-cluster image registry — push
#                     target for Strimzi KafkaConnect Build (kaniko) and any
#                     in-cluster image producers
#   - network-policies: platform-wide default-deny + explicit allow rules
resources:
  - namespace.yaml
  - cert-manager
  - istio
  - knative
  - auth
  - kubeflow-core
  - keda                        # ADR-012: event-driven autoscaling (KEDA 2.19)
  - kueue
  - metrics-server              # k3s metrics-server kubelet-insecure-tls patch
  - registry                    # CNCF Distribution v3 in-cluster registry
  - rbac/cluster-roles.yaml
  - rbac/cluster-bindings.yaml
  - network-policies.yaml
