# observability
# ──────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-ingress, namespace: observability }
spec: { podSelector: {}, policyTypes: [Ingress] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-within-namespace, namespace: observability }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress: [{ from: [{ podSelector: {} }] }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-emitters, namespace: observability }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {}  # any namespace can push OTLP/metrics/logs
      ports:
        - { protocol: TCP, port: 4317 }  # OTLP gRPC
        - { protocol: TCP, port: 4318 }  # OTLP HTTP
        - { protocol: TCP, port: 3100 }  # Loki push
        - { protocol: TCP, port: 9090 }  # Prometheus remote-write
        - { protocol: TCP, port: 9091 }  # Pushgateway
        - { protocol: TCP, port: 8000 }  # Evidently
