# ──────────────────────────────────────────────────────────────────────────
# data-processing
# ──────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-ingress, namespace: data-processing }
spec: { podSelector: {}, policyTypes: [Ingress] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-within-namespace, namespace: data-processing }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress: [{ from: [{ podSelector: {} }] }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-consumers, namespace: data-processing }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: observability } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-governance } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: model-lifecycle } }
        # flink-kubernetes-operator probes session-cluster-rest:8081 to read
        # JobManager /overview; without this, SessionObserver gets connection
        # refused at L4 and FlinkDeployment.status.jobManagerDeploymentStatus
        # stays DEPLOYING permanently, which ArgoCD health.lua marks
        # Progressing on the parent platform-data-processing app.
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: flink-operator } }
        # spark-operator submits Spark driver pods into data-processing and
        # reads driver pod status via webhook; same pattern as flink-operator.
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: spark-operator } }
        - namespaceSelector: { matchLabels: { mlops-platform.io/use-case: "true" } }
---
