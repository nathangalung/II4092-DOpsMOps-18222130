# =============================================================================
# Platform-wide NetworkPolicies — default-deny + explicit allow rules
# =============================================================================
# Applied to every platform namespace.  Two policies per namespace:
#   1. default-deny-ingress:  baseline — no inbound unless explicitly allowed.
#   2. allow-within-namespace: pods in the SAME namespace can reach each other.
#
# Additional cross-namespace allows are appended per namespace below.
#
# Kyverno GeneratingPolicy `auto-default-deny-networkpolicy` (ADR-012) emits
# these for new namespaces at creation time; the YAML below is the static
# baseline applied to the platform namespaces that already exist.
# =============================================================================

# ──────────────────────────────────────────────────────────────────────────
# storage
# ──────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-ingress, namespace: storage }
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-within-namespace, namespace: storage }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress: [{ from: [{ podSelector: {} }] }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-consumers, namespace: storage }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-ingestion } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-processing } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-governance } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: model-lifecycle } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: model-serving } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: observability } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: security } }
        - namespaceSelector: { matchLabels: { mlops-platform.io/use-case: "true" } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: external-secrets } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: velero } }
        # cnpg operator + barman-cloud-plugin call postgresql-1:8000/pg/status
        # to extract instance health. Without this entry, default-deny-ingress
        # blocks the operator and Cluster.status.phase stays at "Instance Status
        # Extraction Error: HTTP communication issue" → Application Health=Unknown.
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: cnpg-system } }
---
