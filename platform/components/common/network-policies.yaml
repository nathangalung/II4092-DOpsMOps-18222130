# ──────────────────────────────────────────────────────────────────────────
# security
# ──────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-ingress, namespace: security }
spec: { podSelector: {}, policyTypes: [Ingress] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-within-namespace, namespace: security }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress: [{ from: [{ podSelector: {} }] }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-openbao-clients, namespace: security }
spec:
  podSelector: { matchLabels: { app: openbao } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: external-secrets } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: storage } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-ingestion } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-processing } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-governance } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: model-lifecycle } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: model-serving } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: observability } }
        - namespaceSelector: { matchLabels: { mlops-platform.io/use-case: "true" } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-apisix-external, namespace: security }
spec:
  podSelector: { matchLabels: { app: apisix } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: istio-system } }
---
# KES is a KMS edge — MinIO (storage) generates encryption keys against it
# over mTLS on :7373. Without an explicit allow, default-deny-ingress drops
# the cross-namespace SYN and MinIO crashloops with "connection refused".
# Allow consumers from every platform namespace; KES still enforces its own
# identity check (client cert SPKI hash) on top of the netpol.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-kes-clients, namespace: security }
spec:
  podSelector: { matchLabels: { app: kes } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: storage } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-ingestion } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-processing } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-governance } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: model-lifecycle } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: model-serving } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: observability } }
        - namespaceSelector: { matchLabels: { mlops-platform.io/use-case: "true" } }
---
# ──────────────────────────────────────────────────────────────────────────
# gitops
# ──────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-ingress, namespace: gitops }
spec: { podSelector: {}, policyTypes: [Ingress] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-within-namespace, namespace: gitops }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress: [{ from: [{ podSelector: {} }] }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-external-ingress, namespace: gitops }
spec:
  podSelector: { matchLabels: { app.kubernetes.io/name: argocd-server } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: istio-system } }
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: security } }
---
# Gitea is the in-cluster git source for airflow git-sync (DAGs), tekton
# Pipelines, and any other workload that pulls platform manifests. Without
# this rule the default-deny-ingress above would block every cross-namespace
# git fetch with `Connection reset by peer`.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-gitea-clients, namespace: gitops }
spec:
  podSelector: { matchLabels: { app: gitea } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { app.kubernetes.io/part-of: mlops-platform }
        - namespaceSelector:
            matchLabels: { mlops-platform.io/use-case: "true" }
      ports:
        - { protocol: TCP, port: 3000 }   # HTTP git
        - { protocol: TCP, port: 22 }     # SSH git
---
# ──────────────────────────────────────────────────────────────────────────
# model-lifecycle
# Kubeflow's core NetworkPolicies (see common/kubeflow-core/network-policies.yaml)
# already restrict traffic to specific Kubeflow components, but pods that are
# NOT selected by any of those policies would otherwise default to wide-open.
# This baseline narrows default traffic to the namespace itself; Kubeflow's
# per-component policies are additive.
# ──────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-ingress, namespace: model-lifecycle }
spec: { podSelector: {}, policyTypes: [Ingress] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-within-namespace, namespace: model-lifecycle }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress: [{ from: [{ podSelector: {} }] }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-clients, namespace: model-lifecycle }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        # Experiment/pipeline runs submitted from use-cases
        - namespaceSelector: { matchLabels: { mlops-platform.io/use-case: "true" } }
        # Serving ns pulls model artefacts from MLflow / Model Registry
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: model-serving } }
        # Airflow orchestrates KFP runs
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data-processing } }
        # Observability needs /metrics on Kubeflow controllers
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: observability } }
        # Istio sidecar + ingress gateway
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: istio-system } }
---
# ──────────────────────────────────────────────────────────────────────────
# model-serving
# KServe controllers + InferenceService pods land here. Inbound must be
# restricted to Knative (activator/autoscaler), istio-ingressgateway, the
# controller namespace (model-lifecycle), and Prometheus scrapers. Use-case
# gateways (e.g. <use-case>-gateway) call InferenceServices through the
# ingress gateway, so they do NOT need a direct allow rule.
# ──────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-ingress, namespace: model-serving }
spec: { podSelector: {}, policyTypes: [Ingress] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-within-namespace, namespace: model-serving }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress: [{ from: [{ podSelector: {} }] }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-clients, namespace: model-serving }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        # Knative activator / autoscaler reach Revisions in this namespace
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: knative-serving } }
        # Istio ingress gateway forwards external inference requests
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: istio-system } }
        # KServe controller reconciles InferenceServices from model-lifecycle
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: model-lifecycle } }
        # Prometheus / OTel agent scrape predictor + explainer metrics
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: observability } }
        # Use-case namespaces reach the isvc's internal cluster-local hostname
        - namespaceSelector: { matchLabels: { mlops-platform.io/use-case: "true" } }
