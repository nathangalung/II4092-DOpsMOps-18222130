# =============================================================================
# Platform persona accounts — OpenBao-sourced (ADR-008)
# =============================================================================
# Test / demo "persona" passwords used by the platform's smoke tests and
# documentation examples.  Previously hard-coded as dateng123 / datsci123 /
# mleng123 / busus123 — moved behind OpenBao so rotation is one command
# (`bao kv patch platform/users/personas <key>=<new_password>`).
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-users-secret
  namespace: istio-system
  labels:
    app: platform-users
    app.kubernetes.io/part-of: mlops-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-openbao
    kind: ClusterSecretStore
  target:
    name: platform-users-secret
    creationPolicy: Owner
  data:
    - secretKey: DATA_ENGINEER_PASSWORD
      remoteRef:
        key: platform/users/personas
        property: data_engineer_password
    - secretKey: DATA_SCIENTIST_PASSWORD
      remoteRef:
        key: platform/users/personas
        property: data_scientist_password
    - secretKey: ML_ENGINEER_PASSWORD
      remoteRef:
        key: platform/users/personas
        property: ml_engineer_password
    - secretKey: BUSINESS_USER_PASSWORD
      remoteRef:
        key: platform/users/personas
        property: business_user_password
