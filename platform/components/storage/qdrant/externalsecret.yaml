# =============================================================================
# Qdrant admin API key — sourced from OpenBao (ADR-008 + ADR-011 follow-up)
# =============================================================================
# Qdrant reads its service API key from the QDRANT__SERVICE__API_KEY env
# var (double underscores map to nested YAML keys in Qdrant's config).
# We therefore name the Secret key exactly `QDRANT__SERVICE__API_KEY` so
# it can be mounted via envFrom without per-key `env:` wiring.
#
# Clients in the ml-pipeline namespace receive the same value as
# QDRANT_API_KEY via pipeline-secrets; see overlays/generic/secrets.yaml.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qdrant-admin
  namespace: storage
  labels:
    app: qdrant
    app.kubernetes.io/part-of: mlops-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-openbao
    kind: ClusterSecretStore
  target:
    name: qdrant-admin
    creationPolicy: Owner
  data:
    - secretKey: QDRANT__SERVICE__API_KEY
      remoteRef:
        key: platform/qdrant/admin
        property: api_key
