# =============================================================================
# Valkey AUTH — sourced from OpenBao (ADR-008 + ADR-011 follow-up)
# =============================================================================
# Materialises `valkey-auth` Secret in the storage namespace with a single
# key VALKEY_PASSWORD. Valkey's Deployment mounts this via envFrom so the
# `--requirepass "$VALKEY_PASSWORD"` shell expansion at startup resolves
# to the OpenBao-managed value.
#
# Clients (ml-pipeline ns) receive the same password via the pipeline-
# secrets ExternalSecret which reads from the identical OpenBao path.
# Feast (model-lifecycle ns) receives it via feast-valkey-secret.
# Rotating the OpenBao KV triggers ESO refresh on all three, but the
# Valkey pod must also restart before clients can authenticate with the
# new password — coordinated via `kubectl rollout restart`.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: valkey-auth
  namespace: storage
  labels:
    app: valkey
    app.kubernetes.io/part-of: mlops-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-openbao
    kind: ClusterSecretStore
  target:
    name: valkey-auth
    creationPolicy: Owner
  data:
    - secretKey: VALKEY_PASSWORD
      remoteRef:
        key: platform/valkey/auth
        property: password
