# =============================================================================
# Custom pg_exporter queries for CNPG Cluster/postgresql
# =============================================================================
# Referenced by Cluster.spec.monitoring.customQueriesConfigMap. Focus on
# the platform's hot metrics: replication lag, WAL churn, slow queries,
# connection pool saturation. Default CNPG queries cover general health.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cnpg-queries
  namespace: storage
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: postgres
    cnpg.io/reload: "true"
data:
  queries.yaml: |
    cnpg_pg_replication_lag_seconds:
      query: |
        SELECT
          application_name AS slot_name,
          EXTRACT(EPOCH FROM (now() - pg_last_xact_replay_timestamp()))::float AS lag_seconds
        FROM pg_stat_replication
      metrics:
        - slot_name:
            usage: LABEL
            description: "Replication slot name"
        - lag_seconds:
            usage: GAUGE
            description: "Seconds between primary commit and replica apply (RPO proxy)"

    cnpg_pg_wal_bytes_per_second:
      query: |
        SELECT
          extract(epoch from now())::bigint AS ts,
          pg_current_wal_lsn()::text        AS lsn
      metrics:
        - ts: { usage: COUNTER, description: "wall clock unix seconds" }
        - lsn: { usage: LABEL,   description: "current WAL LSN" }

    cnpg_pg_slow_queries:
      query: |
        SELECT
          datname,
          COUNT(*) FILTER (WHERE mean_exec_time > 1000)::float AS slow_count
        FROM pg_stat_statements JOIN pg_database ON dbid = oid
        GROUP BY datname
      metrics:
        - datname:    { usage: LABEL }
        - slow_count: { usage: GAUGE, description: "# queries with mean_exec_time > 1s" }

    cnpg_pg_connections:
      query: |
        SELECT
          datname,
          state,
          COUNT(*)::float AS count
        FROM pg_stat_activity
        WHERE pid != pg_backend_pid()
        GROUP BY datname, state
      metrics:
        - datname: { usage: LABEL }
        - state:   { usage: LABEL }
        - count:   { usage: GAUGE, description: "connections by database and state" }

    cnpg_pg_bloat_pct:
      query: |
        SELECT
          schemaname || '.' || relname AS relation,
          n_dead_tup::float / GREATEST(n_live_tup, 1) AS bloat_ratio
        FROM pg_stat_user_tables
        WHERE n_live_tup > 1000
      metrics:
        - relation:     { usage: LABEL }
        - bloat_ratio:  { usage: GAUGE, description: "dead/live tuples ratio" }
