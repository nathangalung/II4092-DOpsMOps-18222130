apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# PostgreSQL via CloudNativePG.  Legacy `deployment.yaml` is replaced by the
# CNPG Cluster CR in `cluster.yaml` (ADR-011).
resources:
  - cluster.yaml
  - queries-configmap.yaml
  # Domain-agnostic CDC source DB + schema; idempotent and safe on every reapply.
  - pipeline-db-init.yaml
