# =============================================================================
# Removed: ValidatingPolicy `deny-trivy-vuln-scan-jobs` (admission-layer storm).
# =============================================================================
# Previously this file held a Kyverno deny on `scan-vulnerabilityreport-*` Jobs
# to work around the trivy-operator 0.30.1 / chart 0.32.1 bug where
# `operator.vulnerabilityScannerEnabled: false` is written to the operator CM
# but the Pod/ReplicaSet/StatefulSet controllers still try to spawn vuln scan
# Jobs on every reconcile. The deny worked at the admission layer BUT each
# rejection caused controller-runtime to re-queue the workload immediately, so
# every Pod/RS/SS event in the cluster fired a denied-Job-creation request
# against kube-apiserver — at >50 req/s on a busy cluster. That admission
# retry storm hammered the API server, throttling unrelated reconcilers
# (CSI sidecars, ArgoCD, ESO) and reproducing the recurring IO cascade
# (#160/166/169/214/249/256 — all pre-ADR-031 era).
#
# New strategy (no admission denial): let the vuln scan Jobs be CREATED but
# bound their cost so they self-clean. The trivy-operator helm-release sets
# `scanJobsRetryDelay: 1h` and `scanJobTimeout: 2m`. Each scan Pod fails fast
# on `ghcr.io/aquasecurity/trivy-db` ImagePullBackOff (air-gapped lab), the
# Job hits its 2-minute deadline, the operator records a failed
# VulnerabilityReport, then re-queues no sooner than 1h later — yielding at
# most ~2 active scan Jobs at any time (concurrent limit) and ~24 reconcile
# attempts per workload per day, instead of >50/s. The `configAuditReport`,
# `rbacAssessmentReport`, `exposedSecretReport`, and `infraAssessmentReport`
# scanners use Trivy's offline Rego bundle (no DB pull) and still complete
# successfully — KNF-09 posture coverage stays >80%.
#
# Re-enable CVE scanning after mirroring `ghcr.io/aquasecurity/trivy-db` to
# the in-cluster Gitea-OCI / Zot registry and pointing `trivy.dbRegistry`
# at it (see security/trivy-operator/helm-release.yaml).
