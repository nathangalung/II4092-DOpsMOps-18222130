# =============================================================================
# ClusterSecretStore — OpenBao KV v2 backend
# =============================================================================
# Every ExternalSecret in every namespace references `platform-openbao` here.
# Authentication: Kubernetes ServiceAccount token (ESO controller SA in
# `external-secrets`), validated by OpenBao's Kubernetes auth method under
# role `external-secrets`.  OpenBao policy `eso-reader` grants read-only on
# `secret/data/platform/*` and `secret/data/usecases/*`.
#
# OpenBao address: `https://openbao.security.svc.cluster.local:8200` (with TLS
# enabled under ADR-009 post-ESO bootstrap).  During bootstrap OpenBao is HTTP
# on port 8200 — `caBundle` empty, `skipTLSVerify: true`.
#
# Note: `provider.vault:` is the literal ESO CRD field name — OpenBao is
# HTTP-API compatible with HashiCorp Vault, so the same provider works unchanged.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: platform-openbao
  labels:
    app.kubernetes.io/part-of: mlops-platform
spec:
  provider:
    vault:
      server: "http://openbao.security.svc.cluster.local:8200"   # TLS via Istio mTLS
      path: "secret"        # KV v2 mount
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# =============================================================================
# ClusterSecretStore — `kubernetes` provider, mirror from data-ingestion
# =============================================================================
# Strimzi User Operator emits each KafkaUser's SCRAM credential as a Secret in
# the same namespace as its KafkaCluster (here: `data-ingestion`). KEDA
# TriggerAuthentication and use-case workloads read secrets from THEIR own
# namespace, so we need a controller-managed mirror — granting cross-namespace
# RBAC on Secrets to every consumer is exactly the trust-boundary anti-pattern
# external-secrets exists to avoid.
#
# Each consuming use case writes a single `ExternalSecret` referencing this
# store with `remoteRef.key: <kafka-user-secret-name>`; ESO copies the chosen
# keys into a Secret in the consumer's own namespace and refreshes them.
#
# Trust model: only the ESO controller SA holds the get-secrets right in
# `data-ingestion`; consumer SAs never see foreign secrets directly. Per-key
# scoping (workloads only mirror keys they need) is enforced via the
# ExternalSecret `data` list, not RBAC — reasonable because all consumers are
# trusted in-cluster operators inside this thesis.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: platform-kafka-users
  labels:
    app.kubernetes.io/part-of: mlops-platform
spec:
  provider:
    kubernetes:
      remoteNamespace: data-ingestion
      server:
        # Default in-cluster API server; cert pinned via the kube-root-ca
        # ConfigMap that kube-controller-manager publishes into every namespace.
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: external-secrets
      auth:
        serviceAccount:
          name: eso-kafka-users-reader
          namespace: data-ingestion
---
# RBAC supporting the store above. Lives here, not in data-ingestion's manifest
# tree, because the SA exists solely to back this ClusterSecretStore — keeping
# them together prevents the kind of GitOps drift where one is deleted and the
# other silently breaks.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-kafka-users-reader
  namespace: data-ingestion
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-kafka-users-reader
  namespace: data-ingestion
  labels:
    app.kubernetes.io/part-of: mlops-platform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # ESO kubernetes provider performs a SelfSubjectRulesReview at startup to
  # surface clear error messages when RBAC is missing.
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-kafka-users-reader
  namespace: data-ingestion
  labels:
    app.kubernetes.io/part-of: mlops-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-kafka-users-reader
subjects:
  - kind: ServiceAccount
    name: eso-kafka-users-reader
    namespace: data-ingestion
---
# =============================================================================
# ClusterSecretStore — `kubernetes` provider, mirror from storage/postgresql-app
# =============================================================================
# CNPG operator generates `postgresql-app` Secret in `storage` namespace with
# the auto-rotated app-user password. After PG cluster recreate the password
# changes; OpenBao's `secret/platform/postgres/app` goes stale and consumers
# (datahub-gms, mlflow, kubeflow, etc.) fail with
#   PSQLException: FATAL: password authentication failed for user "platform"
#
# This store exposes the live CNPG Secret directly so consumers always read
# the current password without depending on openbao-bootstrap completing.
# Same trust model as `platform-kafka-users` above.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: platform-postgres-app
  labels:
    app.kubernetes.io/part-of: mlops-platform
spec:
  provider:
    kubernetes:
      remoteNamespace: storage
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: external-secrets
      auth:
        serviceAccount:
          name: eso-postgres-app-reader
          namespace: storage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-postgres-app-reader
  namespace: storage
  labels:
    app.kubernetes.io/part-of: mlops-platform
    app.kubernetes.io/component: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-postgres-app-reader
  namespace: storage
  labels:
    app.kubernetes.io/part-of: mlops-platform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-postgres-app-reader
  namespace: storage
  labels:
    app.kubernetes.io/part-of: mlops-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-postgres-app-reader
subjects:
  - kind: ServiceAccount
    name: eso-postgres-app-reader
    namespace: storage
---
