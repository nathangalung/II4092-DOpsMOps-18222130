apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Security stack (ADR-002 / ADR-008 / ADR-012 / ADR-014):
#   - OpenBao:           secrets manager + HA Raft (3 replicas)
#   - KES:               KMS front-end for MinIO SSE-KMS, backed by
#                        OpenBao KV v1 (at kes-kv/) with transit wrap (kes-wrap)
#   - APISIX:            API gateway with TLS 1.3 + OIDC + Cosign image verify
#   - External Secrets:  ExternalSecret reconciler (pulls from OpenBao KV)
#   - Kyverno:           admission policies + Cosign verify + generating policies
#   - Velero:            backup & restore to MinIO
#   - Chaos Mesh:        chaos engineering for KNF-04 validation
#   - Falco:             runtime security (eBPF syscall detection) + sidekick
#   - Trivy Operator:    continuous image/IaC/config vulnerability scanning
#
# Ordering note: openbao is listed before kes because openbao-bootstrap.yaml
# provisions the kes-kv KV engine, transit engine + kes-wrap key, and the
# approle that the KES Deployment authenticates with.  KES's own
# initContainer polls OpenBao until ready, so out-of-order application
# self-heals, but this ordering matches the intended flow.
resources:
  - namespace.yaml
  - openbao
  - kes
  - apisix
  - external-secrets
  - kyverno
  - velero
  - chaos-mesh
  - falco
  - trivy-operator
