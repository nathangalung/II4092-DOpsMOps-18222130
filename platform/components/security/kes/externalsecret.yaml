# =============================================================================
# ExternalSecret: kes-openbao-auth — approle creds consumed by KES
# =============================================================================
# The approle's role_id + secret_id are generated by openbao-bootstrap.yaml and
# stored at `secret/platform/kes/openbao-auth` in OpenBao.  openbao-bootstrap
# also direct-writes a K8s Secret of the same name (`kes-openbao-auth`) in this
# namespace so the KES pod can start before ESO has fully reconciled (i.e.
# on first boot).
#
# `creationPolicy: Merge` is chosen so that:
#   * the K8s Secret created by openbao-bootstrap continues to exist even if
#     this ExternalSecret is deleted (ESO only *updates* the data, never
#     creates or deletes);
#   * on rotation (re-run of openbao-bootstrap), ESO merges the new role_id +
#     secret_id into the existing Secret, and KES picks them up on its
#     next OpenBao auth refresh (15s retry window).
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kes-openbao-auth
  namespace: security
  labels:
    app: kes
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-openbao
    kind: ClusterSecretStore
  target:
    name: kes-openbao-auth
    # Merge mode — don't error if the Secret already exists from the
    # direct openbao-bootstrap write; just keep it in sync with OpenBao.
    creationPolicy: Merge
    # ESO default mirrors ExternalSecret annotations to the target Secret,
    # including the parent Argo Application's `argocd.argoproj.io/tracking-id`.
    # The mirrored value carries `kind=external-secrets.io/ExternalSecret`,
    # so ArgoCD then interprets the Secret as "tracked-by-Application but
    # represented in source as an ExternalSecret" — and reports the Secret
    # as an EXTRA resource forever (source doesn't declare a Secret of that
    # name; openbao-bootstrap.yaml creates it imperatively). An explicit
    # template with `mergePolicy: Merge` (default) + empty annotations tells
    # ESO it owns no annotations on the target. SSA then releases the
    # tracking-id field; with no other owner claiming it, kube-apiserver GCs
    # it on the next ESO reconcile. Labels are left to merge so existing
    # selectors (kms-frontend / mlops-platform) keep matching.
    template:
      engineVersion: v2
      mergePolicy: Merge
      metadata:
        annotations: {}
  data:
    - secretKey: BAO_APPROLE_ID
      remoteRef:
        key: platform/kes/openbao-auth
        property: role_id
    - secretKey: BAO_APPROLE_SECRET
      remoteRef:
        key: platform/kes/openbao-auth
        property: secret_id
