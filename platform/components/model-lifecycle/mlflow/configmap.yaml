apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-config
  namespace: model-lifecycle
  labels:
    app: mlflow
    component: model-lifecycle
data:
  # Non-secret runtime flags. All credential-bearing values (AWS keys,
  # MLFLOW_BACKEND_STORE_URI) now live in ExternalSecret-populated Secrets;
  # see secrets.yaml.
  MLFLOW_S3_ENDPOINT_URL: "http://minio.storage.svc.cluster.local:9000"
  MLFLOW_S3_IGNORE_TLS: "true"
  MLFLOW_DEFAULT_ARTIFACT_ROOT: "s3://mlflow/artifacts"
  MLFLOW_ARTIFACTS_DESTINATION: "s3://mlflow/artifacts"
  MLFLOW_HOST: "0.0.0.0"
  MLFLOW_PORT: "5000"
  MLFLOW_SERVE_ARTIFACTS: "true"
  MLFLOW_ARTIFACTS_ONLY: "false"
