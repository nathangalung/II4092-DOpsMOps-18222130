apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mlflow-network-policy
  namespace: model-lifecycle
  labels:
    app: mlflow
spec:
  podSelector:
    matchLabels:
      app: mlflow
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from any pod in the cluster on port 5000
    - from: []
      ports:
        - protocol: TCP
          port: 5000
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow PostgreSQL access
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
      ports:
        - protocol: TCP
          port: 5432
    # Allow access to MinIO in storage namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
      ports:
        - protocol: TCP
          port: 9000
    # Allow HTTPS egress for uv to install DB drivers (PyPI, GitHub releases)
    - to: []
      ports:
        - protocol: TCP
          port: 443
