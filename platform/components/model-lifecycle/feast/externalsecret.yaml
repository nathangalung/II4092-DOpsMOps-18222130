# =============================================================================
# Feast online-store Valkey password — sourced from OpenBao (ADR-008)
# =============================================================================
# Feast 0.62 reads the Valkey password from the `connection_string` field of
# the online_store config block, in a `host:port,password=XXX` form. Because
# Feast's YAML parser doesn't honour ${ENV_VAR} natively, the render-feature-
# store init container substitutes `${VALKEY_PASSWORD}` into the template with
# envsubst at pod start. This Secret supplies that variable via envFrom.
#
# Kept as a separate Secret (rather than extending feast-postgres-secret)
# so rotations of the Valkey password and the Postgres password are
# independent — changing one ESO source doesn't invalidate the other.
#
# Intentionally lives in the model-lifecycle namespace (same ns as the Feast
# Deployment). The use-case overlay still supplies feast-postgres-secret +
# feast-feature-repo from its own namespace; bringing that overlay's ns
# into line with Feast is tracked as a separate post-migration task.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: feast-valkey-secret
  namespace: model-lifecycle
  labels:
    app: feast
    app.kubernetes.io/part-of: mlops-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-openbao
    kind: ClusterSecretStore
  target:
    name: feast-valkey-secret
    creationPolicy: Owner
  data:
    - secretKey: VALKEY_PASSWORD
      remoteRef:
        key: platform/valkey/auth
        property: password
---
# Feast registry — MinIO S3 credentials.  The Feast 0.62 file registry uses
# fsspec → s3fs → boto3, all three of which pick up AWS_ACCESS_KEY_ID and
# AWS_SECRET_ACCESS_KEY from the pod env.  Only the credentials float —
# AWS_ENDPOINT_URL_S3 / AWS_DEFAULT_REGION are static and set directly in
# deployment.yaml so a credential rotation doesn't churn the URL.
#
# Sourced from `platform/minio/root` to match the canonical pattern used by
# mlflow, loki, pyroscope, kubeflow-pipelines, trino, lakefs, etc.
# A follow-up P1 can narrow all of these to a dedicated MinIO IAM user once
# bucket-bootstrap.yaml grows an `mc admin user add` + policy attach step.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: feast-s3
  namespace: model-lifecycle
  labels:
    app: feast
    app.kubernetes.io/part-of: mlops-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-openbao
    kind: ClusterSecretStore
  target:
    name: feast-s3
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: platform/minio/root
        property: username
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: platform/minio/root
        property: password
---
# Feast offline-store ClickHouse credential. Reuses the platform `default`
# CH user (admin) — the Altinity CHI bootstrap doesn't provision a dedicated
# `feast` CH role, and `default` already has access_management=1 over the
# `default` DB used by the offline_store. CH_USER/CH_PASSWORD are templated
# into env names CLICKHOUSE_USER/CLICKHOUSE_PASSWORD that
# render-feast-config.sh substitutes into feature_store.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: feast-clickhouse-secret
  namespace: model-lifecycle
  labels:
    app: feast
    app.kubernetes.io/part-of: mlops-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-openbao
    kind: ClusterSecretStore
  target:
    name: feast-clickhouse-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        CLICKHOUSE_USER: "{{ .username }}"
        CLICKHOUSE_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: platform/clickhouse/admin
        property: username
    - secretKey: password
      remoteRef:
        key: platform/clickhouse/admin
        property: password
