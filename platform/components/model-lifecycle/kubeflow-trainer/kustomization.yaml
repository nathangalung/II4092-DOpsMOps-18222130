apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: model-lifecycle

resources:
  - crds.yaml
  - resources.yaml

patches:
  # Fix trainer controller timeout and resource issues  
  - target:
      kind: Deployment
      name: kubeflow-trainer-controller-manager
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          # Single-pod bootstrap; bump for production load.
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      - op: replace
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirst
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: KUBERNETES_CLUSTER_DOMAIN
            value: cluster.local
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 5
      - op: add
        path: /spec/template/spec/terminationGracePeriodSeconds
        value: 30

  # Fix jobset-controller-manager networking and stability
  - target:
      kind: Deployment
      name: jobset-controller-manager
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          # Single-pod bootstrap; bump for production load.
          requests:
            cpu: "50m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      - op: replace
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirst
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 5
      - op: add
        path: /spec/template/spec/terminationGracePeriodSeconds
        value: 30