    - kubeflow-trainer-controller-manager.model-lifecycle.svc
    - kubeflow-trainer-controller-manager.model-lifecycle.svc.cluster.local
  isCA: true
  issuerRef:
    kind: Issuer
    name: jobset-selfsigned-issuer
  secretName: kubeflow-trainer-webhook-cert
