apiVersion: v1
data:
  controller_manager_config.yaml: |
    apiVersion: config.jobset.x-k8s.io/v1alpha1
    kind: Configuration
    # Bump leader-election timings — controller-runtime defaults (15s/10s/2s)
    # are too tight under K3s kine pressure. Lease-renewal HTTP uses a 5s
    # client-go timeout against API server; under pressure those time out →
    # controller exits with `leader election lost` → SystemD restart → lease
    # still held by dead pod for 15s → API thrash. 60/40/10 keeps lease alive
    # across multi-second API stalls. Same pattern as ESO/kueue/spark
    # (#216 leader-elect storm fix).
    leaderElection:
      leaderElect: true
      leaseDuration: 60s
      renewDeadline: 40s
      retryPeriod: 10s
    # cert-manager Certificate (jobset-webhook-server-cert below) owns the
    # webhook Secret. Setting enable=true here makes the controller ALSO
    # rotate the cert in-process — both managers race on the same Secret,
    # producing a renewal loop (~12 rev/min observed via Secret managedFields).
    # Disable internal management; cert-manager is the platform-wide standard.
    internalCertManagement:
      enable: false
kind: ConfigMap
metadata:
  name: jobset-manager-config
  namespace: model-lifecycle
---
apiVersion: v1
data:
  controller_manager_config.yaml: |
    apiVersion: config.trainer.kubeflow.org/v1alpha1
    kind: Configuration
    # Health configuration
    health:
      healthProbeBindAddress: :8081
      readinessEndpointName: readyz
      livenessEndpointName: healthz

    # Metrics configuration
    metrics:
      bindAddress: :8443
      secureServing: true

    # Webhook configuration
    webhook:
      port: 9443
      host: ""

    # Leader election configuration — bump from defaults (15/10/2) to keep
    # lease alive across K3s kine API stalls. Same pattern as ESO/kueue/spark
    # (#216 leader-elect storm fix). 60/40/10 keeps lease intact during
    # multi-second renewal HTTP timeouts without slowing failover past a
    # minute (single replica → no contender anyway).
    leaderElection:
      leaderElect: true
      resourceName: trainer.kubeflow.org
      resourceNamespace: ""
      leaseDuration: 60s
      renewDeadline: 40s
      retryPeriod: 10s

    # Controller configuration
    controller:
      groupKindConcurrency:
        TrainJob.trainer.kubeflow.org: 5
        TrainingRuntime.trainer.kubeflow.org: 1
        ClusterTrainingRuntime.trainer.kubeflow.org: 1

    # Certificate management configuration
    # cert-manager Certificate (kubeflow-trainer-webhook-cert below) owns the
    # webhook Secret. Setting enable=true here makes the controller ALSO
    # rotate it in-process — both managers race, producing a renewal loop.
    # Disable internal management; cert-manager is the platform-wide standard.
    certManagement:
      enable: false
      webhookServiceName: kubeflow-trainer-controller-manager
      webhookSecretName: kubeflow-trainer-webhook-cert

    # Client connection configuration
    clientConnection:
      qps: 50
      burst: 100
kind: ConfigMap
metadata:
  name: kubeflow-trainer-config
  namespace: model-lifecycle
