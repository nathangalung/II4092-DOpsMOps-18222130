apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: jobset
    app.kubernetes.io/instance: controller-manager
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: deployment
    app.kubernetes.io/part-of: jobset
    control-plane: controller-manager
  name: jobset-controller-manager
  namespace: model-lifecycle
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      containers:
        - args:
            - --config=/controller_manager_config.yaml
            - --zap-log-level=2
          command:
            - /manager
          image: registry.k8s.io/jobset/jobset:v0.11.1
          # Default timeoutSeconds=1 fails under kine apiserver latency on
          # single-node k3s — pod restarts ~34 times in 12h with
          # "Liveness probe failed: context deadline exceeded". Bump to 10s
          # and lift initialDelay/period so the manager has room to settle
          # after leader-elect + webhook cert watch boot.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          name: manager
          ports:
            - containerPort: 8443
              name: metrics
              protocol: TCP
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
          # Single-pod bootstrap; bump for production load.
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /controller_manager_config.yaml
              name: manager-config
              subPath: controller_manager_config.yaml
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: jobset-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
        - configMap:
            name: jobset-manager-config
          name: manager-config
        - name: cert
          secret:
            defaultMode: 420
            secretName: jobset-webhook-server-cert
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/name: trainer
    app.kubernetes.io/part-of: kubeflow
  name: kubeflow-trainer-controller-manager
  namespace: model-lifecycle
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: manager
      app.kubernetes.io/name: trainer
      app.kubernetes.io/part-of: kubeflow
  template:
    metadata:
      labels:
        app.kubernetes.io/component: manager
        app.kubernetes.io/name: trainer
        app.kubernetes.io/part-of: kubeflow
    spec:
      containers:
        - args:
            - --config=/controller_manager_config.yaml
            - --zap-log-level=2
          image: ghcr.io/kubeflow/trainer/trainer-controller-manager:v2.2.0
          # See jobset comment above — same kine-pressure restart pattern
          # (36 restarts/12h with /healthz context deadline). 10s timeout +
          # longer initialDelay gives the trainer manager room to settle
          # under single-node kine apiserver latency.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          name: manager
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          # Single-pod bootstrap; bump for production load.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /controller_manager_config.yaml
              name: kubeflow-trainer-config
              readOnly: true
              subPath: controller_manager_config.yaml
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
      serviceAccountName: kubeflow-trainer-controller-manager
      volumes:
        - configMap:
            name: kubeflow-trainer-config
          name: kubeflow-trainer-config
        - name: cert
          secret:
            defaultMode: 420
            secretName: kubeflow-trainer-webhook-cert
---
apiVersion: trainer.kubeflow.org/v1alpha1
kind: ClusterTrainingRuntime
metadata:
  labels:
    trainer.kubeflow.org/framework: deepspeed
  name: deepspeed-distributed
spec:
  mlPolicy:
    mpi:
      mpiImplementation: OpenMPI
      numProcPerNode: 1
      runLauncherAsNode: true
      sshAuthMountPath: /home/mpiuser/.ssh
    numNodes: 1
  template:
    spec:
      network:
        publishNotReadyAddresses: true
      replicatedJobs:
        - name: launcher
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: trainer
            spec:
              template:
                spec:
                  containers:
                    - image: ghcr.io/kubeflow/trainer/deepspeed-runtime:v0.4.0
                      name: node
                      securityContext:
                        runAsUser: 1000
        - name: node
          template:
            spec:
              template:
                spec:
                  containers:
                    - args:
                        - -De
                        - -f
                        - /home/mpiuser/.sshd_config
                      command:
                        - /usr/sbin/sshd
                      image: ghcr.io/kubeflow/trainer/deepspeed-runtime:v0.4.0
                      name: node
                      readinessProbe:
                        initialDelaySeconds: 5
                        tcpSocket:
                          port: 2222
                      securityContext:
                        runAsUser: 1000
      successPolicy:
        operator: All
        targetReplicatedJobs:
          - launcher
---
