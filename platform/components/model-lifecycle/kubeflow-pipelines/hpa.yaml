apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: metadata-writer
  namespace: model-lifecycle
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: metadata-writer
  # Singleton writer — subscribes to Argo workflow events and inserts into
  # MLMD without leader election. Two replicas = duplicate MLMD inserts.
  # Upstream KFP standalone keeps replicas:1 for this reason.
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
