apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cache-server
  namespace: model-lifecycle
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cache-server
  minReplicas: 1
  maxReplicas: 1 # Single-pod bootstrap; bump for production load.
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
