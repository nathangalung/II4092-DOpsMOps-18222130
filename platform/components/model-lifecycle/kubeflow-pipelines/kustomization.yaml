  # 14. GitOps re-pull hygiene — NOT a P0.3 closure
  # Two upstream KFP Deployments ship with imagePullPolicy: Always, which forces
  # a registry round-trip on every pod restart and amplifies upstream-registry
  # latency under ArgoCD self-heal / node reboots. KFP's own digests (2.15.0)
  # are already semver-pinned at the `images:` block, so IfNotPresent preserves
  # version-lock while eliminating the per-restart pull storm.
  # The P0.3 Kubeflow version-lock audit item is tracked separately and was
  # validated closed on 2026-04-19 (see REMEDIATION_RUNBOOK §Follow-ups).
  - target:
      kind: Deployment
      name: cache-server
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
  - target:
      kind: Deployment
      name: ml-pipeline-viewer-crd
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
