apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: model-lifecycle

resources:
  - pipelines.yaml
  - hpa.yaml  # 7 KFP HPAs (cache-server, metadata-envoy, metadata-grpc, metadata-writer, ml-pipeline, ml-pipeline-ui, ml-pipeline-visualizationserver). Single-node bootstrap: minReplicas=maxReplicas=1; bump for prod load.
  # `minio-service-kubeflow.yaml` was moved to ../minio-service-kubeflow.yaml
  # because this kustomization forces `namespace: model-lifecycle` on every
  # resource, but the KFP v2 launcher hardcodes `minio-service.kubeflow` —
  # the Service MUST stay in namespace `kubeflow`.

patches:
  # 1. Point KFP's pipeline-install-config ConfigMap at platform MySQL + MinIO.
  #    Cannot use Postgres for MLMD (metadata-grpc-deployment): the binary uses
  #    libmysqlclient (C++) hard-bound to MySQL wire protocol; gorm-on-Postgres
  #    works only for the KFP API server — not MLMD. Both share this ConfigMap,
  #    so the LCD is mysql. dbType=mysql is the upstream default.
  #    Service: mysql.storage.svc.cluster.local (port 3306).
  - target:
      kind: ConfigMap
      name: pipeline-install-config
    patch: |-
      - op: replace
        path: /data/bucketName
        value: "kubeflow-pipelines"
      - op: replace
        path: /data/minioServiceHost
        value: "minio.storage.svc.cluster.local"
      - op: replace
        path: /data/minioServicePort
        value: "9000"
      - op: replace
        path: /data/dbHost
        value: "mysql.storage.svc.cluster.local"
      - op: replace
        path: /data/mysqlHost
        value: "mysql.storage.svc.cluster.local"

  # 2 / 2a intentionally removed.  The upstream `mysql-secret` and
  #   `mlpipeline-minio-artifact` Secrets were replaced with ExternalSecret
  #   resources in pipelines.yaml (see the `-----KFP artifact-store +
  #   metadata DB credentials (ADR-008)-----` block).  ESO pulls both
  #   credential pairs from OpenBao (`platform/postgres/app` and
  #   `platform/minio/root`), so no in-tree stringData patching is needed.
  #   Attempting to patch a kind: Secret that no longer exists in the tree
  #   would fail at kustomize build time — hence the removal, not a
  #   silent update.

  # 2b. Fix metadata-writer deployment (merged from kubeflow-metadata patches)
  - target:
      kind: Deployment
      name: metadata-writer
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
      - op: replace
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirst
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: POD_NAMESPACE
          value: model-lifecycle

  # 2b2. Fix metadata-grpc-deployment resources and probes (from kubeflow-metadata patches)
  - target:
      kind: Deployment
      name: metadata-grpc-deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      - op: replace
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirst
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/initialDelaySeconds
        value: 60
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 120

  # 2b3. Fix cache-server Certificate dnsNames (namespace was kubeflow, now model-lifecycle)
  - target:
      kind: Certificate
      name: kfp-cache-cert
    patch: |-
      - op: replace
        path: /spec/dnsNames
        value:
          - cache-server
          - cache-server.model-lifecycle
          - cache-server.model-lifecycle.svc
          - cache-server.model-lifecycle.svc.cluster.local

  # 2b4. Fix MutatingWebhookConfiguration cert annotation (namespace was kubeflow, now model-lifecycle)
  - target:
      kind: MutatingWebhookConfiguration
      name: cache-webhook-kubeflow
    patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1inject-ca-from
        value: model-lifecycle/kfp-cache-cert

  # 2b5. Override KFP API server default pipeline runner SA.
  #   Upstream KFP defaults to `default-editor` (Kubeflow profile convention).
  #   We don't deploy Kubeflow profiles on this single-node setup, so the SA
  #   doesn't exist — every ScheduledWorkflow firing dies at root-driver pod
  #   creation with `serviceaccount "default-editor" not found`.
  #   Point at `pipeline-runner` SA which is shipped by KFP (defined in
  #   pipelines.yaml) and has the KFP-runner ClusterRoleBinding from
  #   use-case-crypto/manifests/base/rbac/kfp-runner.yaml.
  #   kfp.Client.create_recurring_run(service_account=) is silently ignored
  #   by v2beta1 server — this ConfigMap is the only authoritative knob.
  - target:
      kind: ConfigMap
      name: pipeline-api-server-config-dc9hkg52h6
    patch: |-
      - op: replace
        path: /data/DEFAULTPIPELINERUNNERSERVICEACCOUNT
        value: "pipeline-runner"

  # 2c. Add startup delay for ml-pipeline-persistenceagent
  - target:
      kind: Deployment
      name: ml-pipeline-persistenceagent
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      - op: replace
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirst
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: KUBERNETES_CLUSTER_DOMAIN
          value: cluster.local
      - op: add
        path: /spec/template/spec/initContainers
        value:
          - name: wait-for-ml-pipeline
            image: curlimages/curl:8.20.0
            command: ['sh', '-c']
            args:
              - |
                echo "Waiting for ML Pipeline API to be ready..."
                while ! curl -f http://ml-pipeline:8888/apis/v1beta1/healthz; do
                  echo "ML Pipeline API not ready, waiting..."
                  sleep 10
                done
                echo "ML Pipeline API is ready!"
      - op: add
        path: /spec/template/spec/terminationGracePeriodSeconds
        value: 30

  # 3. DELETE embedded KFP minio/mysql Deployments — we use platform
  #    minio.storage and mysql.storage via ExternalName aliases (patch #9/#11).
  #    Previously patched to replicas=0; $patch: delete is cleaner and removes
  #    the associated PVCs + ServiceAccounts at Kustomize build time.
  - target:
      kind: Deployment
      name: minio
    patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: minio
  - target:
      kind: Deployment
      name: mysql
    patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mysql
  - target:
      kind: PersistentVolumeClaim
      name: minio-pvc
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: minio-pvc
  - target:
      kind: PersistentVolumeClaim
      name: mysql-pv-claim
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: mysql-pv-claim

  # 4. DELETE the entire metacontroller subsystem.
  #
  # Rationale (audit AUDIT_FINAL_2026-04-20 §5.2):
  #   * KFP v2 caching uses MutatingWebhookConfiguration — no CompositeController.
  #   * The only CR depending on metacontroller in the upstream manifest is the
  #     `kubeflow-pipelines-profile-controller` DecoratorController, which is
  #     the multi-user profile sync webhook. This deployment targets a single
  #     `model-lifecycle` namespace (single-user pipeline), so profile
  #     sync is dead code — the Deployment, Service, ConfigMaps, and the
  #     DecoratorController CR go with it.
  #   * Removing metacontroller also removes its cluster-wide RBAC surface
  #     (wide apiGroup='*' list/watch on namespaces, deployments, etc.).
  #
  # What is deleted here (all via $patch: delete so kustomize omits them at
  # build time; Argo CD pruning then removes the cluster objects):
  #   - StatefulSet metacontroller
  #   - ServiceAccount meta-controller-service
  #   - ClusterRole kubeflow-metacontroller
  #   - ClusterRoleBinding meta-controller-cluster-role-binding
  #   - CRDs compositecontrollers/controllerrevisions/decoratorcontrollers
  #   - DecoratorController kubeflow-pipelines-profile-controller
  #   - Deployment + Service + code/env ConfigMaps for profile-controller
  #
  # Verification: `grep -rn "metacontroller\.k8s\.io" .` outside this file and
  # pipelines.yaml returns only audit docs — nothing else references the API.
  - target:
      kind: StatefulSet
      name: metacontroller
    patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: metacontroller
  - target:
      kind: ServiceAccount
      name: meta-controller-service
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: meta-controller-service
  - target:
      kind: ClusterRole
      name: kubeflow-metacontroller
    patch: |-
      $patch: delete
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: kubeflow-metacontroller
  - target:
      kind: ClusterRoleBinding
      name: meta-controller-cluster-role-binding
    patch: |-
      $patch: delete
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: meta-controller-cluster-role-binding
  - target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
      name: compositecontrollers.metacontroller.k8s.io
    patch: |-
      $patch: delete
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: compositecontrollers.metacontroller.k8s.io
  - target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
      name: controllerrevisions.metacontroller.k8s.io
    patch: |-
      $patch: delete
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: controllerrevisions.metacontroller.k8s.io
  - target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
      name: decoratorcontrollers.metacontroller.k8s.io
    patch: |-
      $patch: delete
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: decoratorcontrollers.metacontroller.k8s.io
  - target:
      group: metacontroller.k8s.io
      version: v1alpha1
      kind: DecoratorController
      name: kubeflow-pipelines-profile-controller
    patch: |-
      $patch: delete
      apiVersion: metacontroller.k8s.io/v1alpha1
      kind: DecoratorController
      metadata:
        name: kubeflow-pipelines-profile-controller
  - target:
      kind: Deployment
      name: kubeflow-pipelines-profile-controller
    patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kubeflow-pipelines-profile-controller
  - target:
      kind: Service
      name: kubeflow-pipelines-profile-controller
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: kubeflow-pipelines-profile-controller
  - target:
      kind: ConfigMap
      name: kubeflow-pipelines-profile-controller-code-42d46f9h7d
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: kubeflow-pipelines-profile-controller-code-42d46f9h7d
  - target:
      kind: ConfigMap
      name: kubeflow-pipelines-profile-controller-env-5252m69c4c
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: kubeflow-pipelines-profile-controller-env-5252m69c4c

  # 4a. DELETE seaweedfs — redundant with MinIO.  The canonical `minio-service`
  #     (patch #9 below) already routes to `minio.storage.svc.cluster.local`.
  #     seaweedfs-service + the seaweedfs Deployment/PVC are dropped entirely.
  - target:
      kind: Deployment
      name: seaweedfs
    patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: seaweedfs
  - target:
      kind: PersistentVolumeClaim
      name: seaweedfs-pvc
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: seaweedfs-pvc
  - target:
      kind: Service
      name: seaweedfs-service
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: seaweedfs-service

  # 5. Fix workflow-controller networking and API connectivity
  - target:
      kind: Deployment
      name: workflow-controller
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      - op: replace
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirst
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: LEADER_ELECTION_IDENTITY
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: KUBERNETES_CLUSTER_DOMAIN
            value: cluster.local
          - name: ARGO_LOG_LEVEL
            value: "info"
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /healthz
            port: 6060
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
          timeoutSeconds: 10
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          httpGet:
            path: /healthz
            port: 6060
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 5
          timeoutSeconds: 10
      - op: add
        path: /spec/template/spec/terminationGracePeriodSeconds
        value: 30
  # 6. Fix ml-pipeline main deployment stability and connectivity
  - target:
      kind: Deployment
      name: ml-pipeline
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      - op: replace
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirst
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: KUBERNETES_CLUSTER_DOMAIN
          value: cluster.local
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 180
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/initialDelaySeconds
        value: 90
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/timeoutSeconds
        value: 30
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/timeoutSeconds
        value: 30
      - op: add
        path: /spec/template/spec/terminationGracePeriodSeconds
        value: 30

  # 7. Fix ml-pipeline-scheduledworkflow networking and stability
  # NOTE: scheduledworkflow controller does NOT expose any HTTP endpoints
  # It only watches and manages ScheduledWorkflow CRDs, so we use exec probe instead
  # The main process is /bin/controller
  - target:
      kind: Deployment
      name: ml-pipeline-scheduledworkflow
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      - op: replace
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirst
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: NAMESPACE
            value: ""
          - name: LOG_LEVEL
            value: info
          - name: CRON_SCHEDULE_TIMEZONE
            valueFrom:
              configMapKeyRef:
                key: cronScheduleTimezone
                name: pipeline-install-config
          - name: KUBERNETES_CLUSTER_DOMAIN
            value: cluster.local
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          exec:
            command:
              - /bin/sh
              - -c
              - "test -f /proc/1/cmdline"
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 5
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          exec:
            command:
              - /bin/sh
              - -c
              - "test -f /proc/1/cmdline"
          initialDelaySeconds: 30
          periodSeconds: 60
          failureThreshold: 5
          timeoutSeconds: 5
      - op: add
        path: /spec/template/spec/terminationGracePeriodSeconds
        value: 30

  # 8. Fix ml-pipeline-viewer-crd stability
  - target:
      kind: Deployment
      name: ml-pipeline-viewer-crd
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      - op: replace
        path: /spec/template/spec/dnsPolicy
        value: ClusterFirst
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: NAMESPACE
            value: ""
          - name: MAX_NUM_VIEWERS
            value: "50"
          - name: KUBERNETES_CLUSTER_DOMAIN
            value: cluster.local
      - op: add
        path: /spec/template/spec/terminationGracePeriodSeconds
        value: 30

  # 9. Fix minio-service to route to actual MinIO in storage namespace
  # This replaces the seaweedfs-based minio-service with ExternalName to minio.storage
  - target:
      kind: Service
      name: minio-service
    patch: |-
      - op: replace
        path: /spec
        value:
          type: ExternalName
          externalName: minio.storage.svc.cluster.local
          ports:
            - port: 9000
              targetPort: 9000
              protocol: TCP
              name: http

  # 10. Fix kfp-launcher ConfigMap — set defaultPipelineRoot AND providers.
  #
  # KFP v2 injects a `kfp-launcher` init container onto every executor pod and
  # that init container reads this ConfigMap + Secret `mlpipeline-minio-artifact`
  # from the POD's namespace at launcher boot. KFP single-user mode
  # (MULTIUSER: false in pipeline-api-server-config) executes ALL pipeline runs
  # in `model-lifecycle`, so this CM is the only one the launcher consults.
  #
  # WITHOUT the `providers` block the launcher falls back to its hardcoded
  # default endpoint (`seaweedfs.kubeflow:9000` in KFP 2.16+) which doesn't
  # resolve here, and every artifact + log upload dies with:
  #   `Failed to upload log artifact … dial tcp: lookup seaweedfs.kubeflow
  #    on 10.43.0.10:53: no such host`.
  #
  # The schema is verified against KFP 2.16.0 source
  # (backend/src/v2/config/s3.go S3ProviderDefault): nested
  # `credentials.secretRef.{secretName, accessKeyKey, secretKeyKey}` — flat
  # placement under credentials would silently no-op.
  - target:
      kind: ConfigMap
      name: kfp-launcher
    patch: |-
      - op: add
        path: /data/defaultPipelineRoot
        value: "minio://kubeflow-pipelines/v2/artifacts"
      - op: add
        path: /data/providers
        value: |
          s3:
            default:
              endpoint: minio.storage.svc.cluster.local:9000
              disableSSL: true
              region: us-east-1
              credentials:
                fromEnv: false
                secretRef:
                  secretName: mlpipeline-minio-artifact
                  accessKeyKey: accesskey
                  secretKeyKey: secretkey
          minio:
            default:
              endpoint: minio.storage.svc.cluster.local:9000
              disableSSL: true
              region: us-east-1
              credentials:
                fromEnv: false
                secretRef:
                  secretName: mlpipeline-minio-artifact
                  accessKeyKey: accesskey
                  secretKeyKey: secretkey

  # 11. Update workflow-controller-configmap to use correct S3 endpoint and default imagePullPolicy
  - target:
      kind: ConfigMap
      name: workflow-controller-configmap
    patch: |-
      - op: replace
        path: /data/artifactRepository
        value: |
          archiveLogs: true
          s3:
            endpoint: "minio.storage.svc.cluster.local:9000"
            bucket: "kubeflow-pipelines"
            keyFormat: "private-artifacts/{{workflow.namespace}}/{{workflow.name}}/{{workflow.creationTimestamp.Y}}/{{workflow.creationTimestamp.m}}/{{workflow.creationTimestamp.d}}/{{pod.name}}"
            insecure: true
            accessKeySecret:
              name: mlpipeline-minio-artifact
              key: accesskey
            secretKeySecret:
              name: mlpipeline-minio-artifact
              key: secretkey
      # workflowDefaults: Workflow-level defaults merged into every
      # Workflow spec at admission time.
      #   - securityContext.fsGroup=8737 makes the emptyDir `/var/run/argo`
      #     group-writable by the same non-zero UID we pin in the executor
      #     securityContext (see /data/executor below). argoexec image
      #     declares USER 0 in its manifest, so without fsGroup the
      #     init container can't write its progress + sidecar-control
      #     files into the mount.
      #   - podSpecPatch (workflow-level) is applied AFTER any template-level
      #     podSpecPatch, so it wins on strategic-merge conflicts. KFP's
      #     `system-container-impl` template uses
      #     `podSpecPatch: '{{inputs.parameters.pod-spec-patch}}'` where the
      #     driver-generated patch sets `name: main` + `resources: {}` (empty).
      #     Empty resources fails Kyverno `require-resource-limits`. Setting
      #     resources here overrides that.
      #   - We do NOT patch the `kfp-launcher` init container here: strategic
      #     merge on `initContainers` by name would ADD a new entry on driver
      #     pods (`system-container-driver`, `system-dag-driver`) that have no
      #     init container, leaving an image-less entry that fails admission
      #     with `spec.initContainers[0].image: Required value`. The launcher
      #     init container's missing `requests.memory` is handled by a
      #     PolicyException scoped to executor pods (see
      #     platform/components/security/kyverno/policies/policy-exception-kfp-launcher.yaml).
      - op: add
        path: /data/workflowDefaults
        value: |
          spec:
            imagePullSecrets: []
            securityContext:
              fsGroup: 8737
            podSpecPatch: |
              containers:
                - name: main
                  imagePullPolicy: IfNotPresent
                  resources:
                    requests:
                      cpu: 200m
                      memory: 256Mi
                    limits:
                      cpu: 2000m
                      memory: 2Gi
      # Argo Workflows injects `init` + `wait` sidecar containers into every
      # workflow pod. Without explicit resources, Kyverno `require-resource-limits`
      # ValidatingPolicy denies the pod (every container must set requests+limits
      # for cpu+memory). The `executor` block here sets cluster-wide defaults
      # for those injected containers — no per-Workflow podSpecPatch needed.
      #
      # securityContext: argoexec image (quay.io/argoproj/argoexec:v3.7.x)
      # is published without a USER directive, so kubelet treats it as
      # potentially-root and refuses to start when pod-level runAsNonRoot=true
      # (`container has runAsNonRoot and image will run as root`). Pin a
      # non-zero UID (8737 = argo's standard non-root UID) + drop ALL caps
      # so Kyverno `require-capability-drop-all` ClusterPolicy admits the
      # pod. Without this, every KFP-driven workflow stalls at
      # `Init:CreateContainerConfigError`.
      - op: replace
        path: /data/executor
        value: |
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 8737
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi

  # 12. REMOVED — kubeflow-pipelines-profile-controller Deployment is deleted
  #     together with metacontroller (see patch #4 above). No S3 endpoint patch
