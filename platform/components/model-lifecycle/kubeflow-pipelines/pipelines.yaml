# -----------------------------------------------------------------------------
# KFP artifact-store + metadata DB credentials (ADR-008)
# -----------------------------------------------------------------------------
# These two blocks diverge from the upstream Kubeflow Pipelines manifests:
# upstream ships hard-coded `minioadmin` / `platform123` Secrets, which fail
# KNF-08 (no plaintext credentials in git).  We replace them with
# ExternalSecrets that pull from OpenBao.  The target Secret names
# (`mlpipeline-minio-artifact`, `mysql-secret`) and the exact data-key
# names (`accesskey`, `secretkey`, `username`, `password`) are preserved
# so the KFP controller and API-server code paths remain byte-identical.
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mlpipeline-minio-artifact
  namespace: model-lifecycle
  labels:
    application-crd-id: kubeflow-pipelines
    app.kubernetes.io/part-of: mlops-platform
spec:
  refreshInterval: 1h
  secretStoreRef: { name: platform-openbao, kind: ClusterSecretStore }
  target:
    name: mlpipeline-minio-artifact
    creationPolicy: Owner
  data:
    - secretKey: accesskey
      remoteRef: { key: platform/minio/root, property: username }
    - secretKey: secretkey
      remoteRef: { key: platform/minio/root, property: password }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mysql-secret
  namespace: model-lifecycle
  labels:
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
    app.kubernetes.io/part-of: mlops-platform
spec:
  refreshInterval: 1h
  secretStoreRef: { name: platform-openbao, kind: ClusterSecretStore }
  target:
    name: mysql-secret
    creationPolicy: Owner
  # MLMD (metadata-grpc-deployment) uses libmysqlclient and cannot connect to
  # Postgres, so KFP+MLMD must point at the platform MySQL service. We use the
  # MySQL root credentials here so the user has DDL rights to auto-create the
  # mlpipeline/metadb/cachedb databases listed in pipeline-install-config.
  # `dataFrom` template extracts `password` from openbao platform/mysql/root and
  # injects a literal `username: root` to match MYSQL_DATABASE owner created
  # by MYSQL_ROOT_PASSWORD + MYSQL_ROOT_HOST=% in storage/mysql/deployment.yaml.
  data:
    - secretKey: username
      remoteRef: { key: platform/mysql/root, property: username, conversionStrategy: Default }
    - secretKey: password
      remoteRef: { key: platform/mysql/root, property: password }
