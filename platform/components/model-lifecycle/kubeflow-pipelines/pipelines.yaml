apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ml-pipeline-ui
    app.kubernetes.io/component: ml-pipeline
    app.kubernetes.io/name: kubeflow-pipelines
    application-crd-id: kubeflow-pipelines
  name: ml-pipeline-ui
  namespace: model-lifecycle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-pipeline-ui
      app.kubernetes.io/component: ml-pipeline
      app.kubernetes.io/name: kubeflow-pipelines
      application-crd-id: kubeflow-pipelines
  template:
    metadata:
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
      labels:
        app: ml-pipeline-ui
        app.kubernetes.io/component: ml-pipeline
        app.kubernetes.io/name: kubeflow-pipelines
        application-crd-id: kubeflow-pipelines
    spec:
      containers:
      - env:
        - name: VIEWER_TENSORBOARD_POD_TEMPLATE_SPEC_PATH
          value: /etc/config/viewer-pod-template.json
        - name: DEPLOYMENT
          value: ""
        - name: ARTIFACTS_SERVICE_PROXY_NAME
          value: ml-pipeline-ui-artifact
        - name: ARTIFACTS_SERVICE_PROXY_PORT
          value: "80"
        - name: ARTIFACTS_SERVICE_PROXY_ENABLED
          valueFrom:
            configMapKeyRef:
              key: ARTIFACTS_PROXY_ENABLED
              name: pipeline-install-config
              optional: true
        - name: ENABLE_AUTHZ
          value: "false"
        - name: KUBEFLOW_USERID_HEADER
          value: kubeflow-userid
        - name: KUBEFLOW_USERID_PREFIX
          value: ""
        - name: MINIO_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: accesskey
              name: mlpipeline-minio-artifact
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: secretkey
              name: mlpipeline-minio-artifact
        - name: ALLOW_CUSTOM_VISUALIZATIONS
          value: "true"
        - name: FRONTEND_SERVER_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ARGO_ARCHIVE_LOGS
          value: "true"
        - name: DISABLE_GKE_METADATA
          value: "true"
        image: ghcr.io/kubeflow/kfp-frontend:2.16.0
        imagePullPolicy: IfNotPresent
        # Upstream chart sets initialDelaySeconds=3 which works in isolation
        # but is too tight under Kyverno-enforced memory limits — the Node.js
        # frontend takes 10-20s to bind :3000, and a 3s liveness window
        # CrashLoops the pod before it serves the first /healthz. Replaced
        # with a 60s startupProbe (tolerates slow boot) + readiness/liveness
        # delays bumped to 30s (field-observed 2026-05-14, exit 137 within
        # 47s of start).
        startupProbe:
          httpGet:
            path: /apis/v1beta1/healthz
            port: 3000
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /apis/v1beta1/healthz
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        name: ml-pipeline-ui
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /apis/v1beta1/healthz
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        # Kyverno `require-resource-limits` denies pods that omit either
        # requests OR limits on every container (field-observed 2026-05-14:
        # FailedCreate "All containers must set resources.requests AND
        # resources.limits for cpu and memory"). Upstream kubeflow-pipelines
        # 2.15 manifests ship requests only; we add limits sized for the
        # Node.js frontend's actual footprint — 256Mi was OOMKilled (exit
        # 137) during startup, 512Mi gives Node.js + React bundle headroom.
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsGroup: 0
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /etc/config
          name: config-volume
          readOnly: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: ml-pipeline-ui
      volumes:
      - configMap:
          name: ml-pipeline-ui-configmap
        name: config-volume
