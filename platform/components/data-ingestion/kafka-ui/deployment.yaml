apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: data-ingestion
spec:
  ports:
    - port: 8084
      name: http
      targetPort: 8080
  selector:
    app: kafka-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: data-ingestion
  labels:
    app: kafka-ui
    app.kubernetes.io/name: kafka-ui
    app.kubernetes.io/component: kafka-console
    app.kubernetes.io/part-of: mlops-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kafka-ui
          image: ghcr.io/kafbat/kafka-ui:v1.5.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # Cluster configuration
            - name: KAFKA_CLUSTERS_0_NAME
              value: "platform"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "platform-kafka-kafka-bootstrap.data-ingestion.svc.cluster.local:9092"
            - name: KAFKA_CLUSTERS_0_SCHEMAREGISTRY
              value: "http://karapace.data-ingestion:8081"
            - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME
              value: "debezium"
            - name: KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS
              value: "http://kafka-connect.data-ingestion:8083"
            # UI settings
            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"
            - name: SERVER_PORT
              value: "8080"
          # Single-pod bootstrap; bump for production load.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
